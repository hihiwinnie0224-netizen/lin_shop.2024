<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◌ LENSES | LINSHOP Select ◌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'Noto Sans TC', sans-serif; background-color: #FDFCFB; color: #666; }
        
        .series-card {
            background: white; border-radius: 30px; overflow: hidden;
            transition: all 0.5s ease; border: 1px solid #F5F2ED; cursor: pointer;
        }
        .series-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .series-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #FAF9F8; }
        .product-title { font-size: 15px; line-height: 1.6; color: #444; font-weight: 500; margin-top: 10px; }

        /* 彈窗背景 */
        .modal { 
            transition: all 0.4s ease; opacity: 0; visibility: hidden; 
            position: fixed; inset: 0; z-index: 100; 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px; background: rgba(245, 242, 237, 0.9); backdrop-filter: blur(15px); 
        }
        .modal.active { opacity: 1; visibility: visible; }
        
        /* 彈窗內容：限制高度並允許內部捲動 */
        .modal-content { 
            background: white; width: 100%; max-width: 600px; 
            border-radius: 40px; position: relative;
            max-height: 80vh; overflow-y: auto; overflow-x: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
        }

        /* 關鍵：固定標題區塊 */
        .modal-sticky-header {
            position: sticky; top: 0; z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 35px 30px 20px;
            border-bottom: 1px solid #F5F2ED;
        }

        /* 彈窗捲動主體 */
        .modal-body { padding: 30px; }

        .variant-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 640px) { .variant-grid { grid-template-cols: repeat(3, 1fr); } }
        
        .variant-item { background: #FDFCFB; border-radius: 20px; padding: 10px; border: 1px solid #F5F2ED; }
        .variant-img { width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; margin-bottom: 8px; }
        
        .info-bar { font-size: 13px; color: #888; margin-top: 8px; font-weight: 500; }
    </style>
</head>
<body>

    <nav class="p-8 flex justify-between items-center">
        <a href="products.html" class="text-[10px] tracking-[0.3em] text-gray-400 uppercase">← BACK</a>
        <h1 class="text-lg font-light tracking-[0.4em] text-gray-800">◌ LENSES ◌</h1>
        <div class="w-10"></div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pb-32 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="series-card" onclick="openModal('m-moon')">
            <img src="https://i.ibb.co/3mVY3qdp/89-FA624-C-1-FC4-41-F9-9375-E4-F2-BA24-ECC3.jpg" class="series-img">
            <div class="p-6">
                <span class="text-[10px] text-gray-300 tracking-[0.2em] font-bold">#瞳友匯</span>
                <h3 class="product-title">◌ 偷走月亮美瞳半年拋 14.5mm 大直徑顯色混血款近視隱形眼鏡</h3>
                <p class="mt-3 text-sm font-semibold text-gray-700">💰 120</p>
            </div>
        </div>
    </main>

    <div id="m-moon" class="modal" onclick="checkClose(event)">
        <div class="modal-content">
            
            <div class="modal-sticky-header">
                <button onclick="closeModal('m-moon')" class="absolute top-6 right-8 text-gray-300 hover:text-black">✕</button>
                <span class="text-[9px] text-gray-300 tracking-[0.2em] font-bold uppercase">Now Selection</span>
                <h2 class="text-base font-medium text-gray-800 leading-relaxed mt-1 pr-6">
                    偷走月亮美瞳半年拋 14.5mm 大直徑顯色混血款近視隱形眼鏡
                </h2>
                <div class="info-bar">
                    💰 $120 ⊹ 度數 0-800 ⊹ 半年拋
                </div>
            </div>

            <div class="modal-body">
                <div class="variant-grid">
                    <div class="variant-item"><img src="https://i.ibb.co/3mVY3qdp/89-FA624-C-1-FC4-41-F9-9375-E4-F2-BA24-ECC3.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 01</p></div>
                    <div class="variant-item"><img src="https://i.ibb.co/cXvFVHPy/DFE7-AF1-F-F5-C2-4123-BD63-AA679-A0451-C0.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 02</p></div>
                    <div class="variant-item"><img src="https://i.ibb.co/ZzmjgQr5/8452-A191-A673-4-E9-A-94-FB-A6-E6719-F253-F.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 03</p></div>
                    <div class="variant-item"><img src="https://i.ibb.co/v4FTG4Q6/00-DC6803-3100-4-ECF-9665-CEBD7752075-C.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 04</p></div>
                    <div class="variant-item"><img src="https://i.ibb.co/Fbpp4BkP/195074-C4-3373-4-C81-B678-47244-D23-F10-C.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 05</p></div>
                    <div class="variant-item"><img src="https://i.ibb.co/TqHJxcPR/A4-F34741-BA67-48-C6-A3-B5-A5-C4450-A4-A9-E.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 06</p></div>
                    <div class="variant-item"><img src="https://i.ibb.co/rKXjSzyt/F7-C629-C2-A716-4717-8252-32019-F560-C3-C.jpg" class="variant-img"><p class="text-[10px] text-center text-gray-400">款式 07</p></div>
                </div>

                <div class="mt-8 p-5 bg-gray-50 rounded-3xl text-center">
                    <p class="text-[11px] text-gray-400 leading-relaxed italic">
                        ˗ˏˋ 下單請直接截圖款式 ˎˊ˗<br>
                        確認度數後點擊下方按鈕前往賣場
                    </p>
                </div>

                <a href="你的連結" target="_blank" class="block w-full mt-6 py-4 bg-gray-800 text-white text-center rounded-2xl text-[11px] font-bold tracking-[0.2em] hover:bg-black transition">
                    GO SHOPPING ⊹ 前往賣場
                </a>
            </div>
            </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        function checkClose(e) {
            if (e.target.classList.contains('modal')) closeModal(e.target.id);
        }
    </script>
</body>
</html>
