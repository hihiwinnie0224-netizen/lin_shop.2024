<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◌ LENSES | LINSHOP Select ◌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'Noto Sans TC', sans-serif; background-color: #FDFCFB; color: #666; }
        
        /* 列表卡片樣式：微調手機端的間距與圓角 */
        .series-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            transition: all 0.5s ease; border: 1px solid #F5F2ED; 
            cursor: pointer; display: flex; flex-direction: column; height: 100%; 
        }
        .series-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .series-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #FAF9F8; }
        
        /* 手機端文字縮小一點，避免擠壓 */
        .product-title { 
            font-size: 13px; line-height: 1.4; color: #444; 
            font-weight: 500; margin-top: 6px; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* 彈窗樣式保持不變 */
        .modal { transition: all 0.4s ease; opacity: 0; visibility: hidden; position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 15px; background: rgba(245, 242, 237, 0.9); backdrop-filter: blur(15px); }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 35px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .modal-sticky-header { position: sticky; top: 0; z-index: 10; background: rgba(255, 255, 255, 0.98); padding: 20px 20px 10px; border-bottom: 1px solid #F5F2ED; }
        .stock-notice { background: #FFF5F5; border-radius: 10px; padding: 8px 12px; font-size: 11px; color: #E53E3E; margin-top: 8px; line-height: 1.5; }
        .modal-body { padding: 20px; }
        .variant-grid { display: grid; grid-cols: 2; grid-template-cols: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 640px) { .variant-grid { grid-template-cols: repeat(3, 1fr); } }
        .variant-img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }
        .download-btn { display: block; width: 100%; padding: 14px; margin-top: 20px; background: #444; color: white; text-align: center; border-radius: 15px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="p-6 text-center">
        <h1 class="text-lg font-light tracking-[0.4em] text-gray-800 uppercase">◌ LINSHOP LENSES ◌</h1>
        <p class="text-[9px] text-gray-400 mt-1 tracking-widest">Premium Select Collection</p>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-24 grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-8">
        
        <div class="series-card" onclick="openModal('m-moon')">
            <img src="https://i.ibb.co/3mVY3qdp/89-FA624-C-1-FC4-41-F9-9375-E4-F2-BA24-ECC3.jpg" class="series-img">
            <div class="p-3 md:p-6">
                <span class="text-[8px] text-gray-300 font-bold uppercase">#瞳友匯</span>
                <h3 class="product-title">偷走月亮半年拋 14.5mm 顯色混血</h3>
            </div>
        </div>

        <div class="series-card" onclick="openModal('m-doll')">
            <img src="https://i.ibb.co/rRG9dJh5/2-FBD4742-4-BD5-4867-A964-D32-CDF0-B495-F.jpg" class="series-img">
            <div class="p-3 md:p-6">
                <span class="text-[8px] text-gray-300 font-bold uppercase">#瞳友匯</span>
                <h3 class="product-title">超大娃娃藍 14.5mm 大直徑純欲漫畫眼</h3>
            </div>
        </div>

        <div class="series-card" onclick="openModal('m-water')">
            <img src="https://i.ibb.co/pvMFbD59/E57-EEE43-6287-4635-A3-A9-B82680-BA3-F06.jpg" class="series-img">
            <div class="p-3 md:p-6">
                <span class="text-[8px] text-gray-300 font-bold uppercase">#瞳友匯</span>
                <h3 class="product-title">純欲水光半年拋 14.5mm 焦香摩卡</h3>
            </div>
        </div>

        <div class="series-card" onclick="openModal('m-peach')">
            <img src="https://i.ibb.co/9kf3ZybJ/D688-F8-F3-6-A88-48-E3-92-C9-A269315467-B2.jpg" class="series-img">
            <div class="p-3 md:p-6">
                <span class="text-[8px] text-gray-300 font-bold uppercase">#瞳友匯</span>
                <h3 class="product-title">心機水蜜桃 14.2mm 大直徑半年拋</h3>
            </div>
        </div>

        <div class="series-card" onclick="openModal('m-bear')">
            <img src="https://i.ibb.co/GwmGccC/9-AF247-E1-84-BA-46-A5-9-B1-B-D33869-ABEA0-B.jpg" class="series-img">
            <div class="p-3 md:p-6">
                <span class="text-[8px] text-gray-300 font-bold uppercase">#鑫視康</span>
                <h3 class="product-title">半年拋小熊 奶皮小撻/糖葫蘆/奶芙卷</h3>
            </div>
        </div>

        <div class="series-card" onclick="openModal('m-dancing')">
            <img src="https://i.ibb.co/tM7Ncs2n/21-BA3-C0-A-75-AD-4-B03-B5-EA-D3-F5-D4-D64-CBE.jpg" class="series-img">
            <div class="p-3 md:p-6">
                <span class="text-[8px] text-gray-300 font-bold uppercase">#DANCING</span>
                <h3 class="product-title">DANCING 爆款年拋 星色物語系列</h3>
            </div>
        </div>

    </main>

    <script>
        function openModal(id) {
            const m = document.getElementById(id);
            if(m) { m.classList.add('active'); document.body.style.overflow = 'hidden'; }
        }
        function closeModal(id) {
            const m = document.getElementById(id);
            if(m) { m.classList.remove('active'); document.body.style.overflow = 'auto'; }
        }
        function checkClose(e) { if (e.target.classList.contains('modal')) closeModal(e.target.id); }
    </script>
</body>
</html>
