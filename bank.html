<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinShop | 莫蘭迪精緻版 ⟡</title>
    <style>
        :root {
            --bg-color: #f7f7f5;
            --main-accent: #b8c6db; /* 霧霾藍 */
            --text-dark: #5e5e5e;
            --text-light: #b0b0b0;
            --income-color: #9db2a2;
            --expense-color: #d1a7a7;
            --card-radius: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-color);
            color: var(--text-dark);
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 400px; /* 寬度微調，手感更好 */
            background: white;
            border-radius: var(--card-radius);
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        }

        h2 { 
            text-align: center; font-weight: 300; letter-spacing: 3px; 
            margin: 10px 0 20px; color: #a5a5a5; font-size: 1rem;
        }

        /* 儀表板 */
        .dashboard {
            background: #9fa9a3;
            color: white; padding: 18px; border-radius: 18px;
            margin-bottom: 20px; position: relative;
        }
        .dashboard.budget-warning { background: #c2948a; }

        .dash-label { font-size: 0.65rem; opacity: 0.8; letter-spacing: 0.5px; }
        .dash-main-val { font-size: 1.8rem; font-weight: 200; margin: 4px 0; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px; }
        .stat-item b { font-size: 0.85rem; font-weight: 400; }

        /* 帳戶卡片 */
        .account-scroll {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 10px;
            scrollbar-width: none;
        }
        .acc-card {
            min-width: 82px; padding: 10px 6px; background: #fbfbfb; border-radius: 12px;
            border: 1px solid #f0f0f0; text-align: center; flex-shrink: 0;
        }
        .acc-card i { font-size: 0.6rem; color: var(--text-light); font-style: normal; display: block; margin-bottom: 2px; }
        .acc-card b { font-size: 0.75rem; color: #777; }

        /* 輸入群組調整 */
        .input-group { background: #fcfcfc; padding: 15px; border-radius: 18px; border: 1px solid #f0f0f0; }
        .field-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .field { display: flex; flex-direction: column; }
        
        label { font-size: 0.6rem; color: var(--text-light); margin: 0 0 4px 4px; }
        input, select {
            height: 36px; padding: 0 10px; border: 1px solid #e8e8e8; border-radius: 8px;
            background: white; font-size: 0.8rem; color: var(--text-dark); outline: none;
        }
        input::placeholder { color: #ddd; }

        .btn-submit {
            width: 100%; height: 42px; background: var(--main-accent); color: white;
            border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer;
            margin-top: 5px; font-weight: 300; transition: 0.3s;
        }
        .btn-submit:hover { opacity: 0.8; }

        /* 列表項目 */
        .record-item {
            display: flex; align-items: center; padding: 12px 10px;
            background: white; border-bottom: 1px solid #f9f9f9;
        }
        .icon-box {
            width: 32px; height: 32px; border-radius: 8px; background: #f5f6f7;
            display: flex; align-items: center; justify-content: center; margin-right: 10px;
            font-size: 1rem;
        }
        .content h4 { margin: 0; font-size: 0.8rem; font-weight: 400; }
        .content p { margin: 2px 0 0; font-size: 0.6rem; color: #ccc; }
        
        .price { font-size: 0.85rem; font-weight: 400; font-family: 'Helvetica', sans-serif; }
        .price.income { color: var(--income-color); }
        .price.expense { color: var(--expense-color); }

        #config-trigger { text-align: center; font-size: 0.6rem; color: #ddd; margin-top: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>LINSHOP LEDGER ⟡</h2>

    <div id="dash-box" class="dashboard">
        <div style="position: absolute; right: 15px; top: 15px;">
            <canvas id="miniChart" width="50" height="50"></canvas>
        </div>
        <div class="dash-label">TOTAL BALANCE</div>
        <div class="dash-main-val" id="total-balance">$ 0</div>
        
        <div class="dash-grid">
            <div class="stat-item">
                <div class="dash-label">INCOME</div>
                <b id="total-income">$ 0</b>
            </div>
            <div class="stat-item">
                <div class="dash-label">EXPENSE</div>
                <b id="total-expense">$ 0</b>
            </div>
        </div>
    </div>

    <div class="account-scroll">
        <div class="acc-card"><i>Fubon</i><b id="acc-fubon">$0</b></div>
        <div class="acc-card"><i>Next</i><b id="acc-next">$0</b></div>
        <div class="acc-card"><i>Feib</i><b id="acc-feib">$0</b></div>
        <div class="acc-card"><i>Cash</i><b id="acc-cash">$0</b></div>
    </div>

    <div class="input-group">
        <div class="field-row">
            <div class="field" style="flex:1.2"><label>DATE</label><input type="date" id="date"></div>
            <div class="field" style="flex:1"><label>TYPE</label>
                <select id="type" onchange="uiSwitch()">
                    <option value="expense">支出 (-)</option>
                    <option value="income">收入 (+)</option>
                    <option value="transfer">轉帳 (⇄)</option>
                </select>
            </div>
        </div>

        <div class="field-row">
            <div class="field" style="flex:1">
                <label id="acc-label">ACCOUNT</label>
                <select id="account">
                    <option value="fubon">富邦銀行</option>
                    <option value="next">將來銀行</option>
                    <option value="feib">遠東銀行</option>
                    <option value="cash">手邊現金</option>
                </select>
            </div>
            <div class="field" id="to-acc-col" style="display:none; flex:1">
                <label>TO</label>
                <select id="to-account">
                    <option value="fubon">富邦銀行</option>
                    <option value="next">將來銀行</option>
                    <option value="feib">遠東銀行</option>
                    <option value="cash">手邊現金</option>
                </select>
            </div>
        </div>

        <div class="field-row">
            <div class="field" style="flex:1"><label>CATEGORY</label>
                <select id="category">
                    <option value="🍱 餐飲">🍱 餐飲</option>
                    <option value="📦 代購">📦 代購</option>
                    <option value="🚗 交通">🚗 交通</option>
                    <option value="✨ 娛樂">✨ 娛樂</option>
                    <option value="🏠 固定">🏠 固定</option>
                    <option value="💰 薪資">💰 薪資</option>
                    <option value="🛒 雜項">🛒 雜項</option>
                </select>
            </div>
            <div class="field" style="flex:0.8"><label>AMOUNT</label><input type="number" id="amount" placeholder="$"></div>
        </div>

        <div class="field-row">
            <div class="field" style="flex:1"><label>MEMO</label><input type="text" id="name" placeholder="Note something..."></div>
        </div>

        <button class="btn-submit" onclick="addRecord()">Add Record</button>
        <div id="config-trigger" onclick="setBudget()">Budget Setting ⚙️</div>
    </div>

    <div class="list-header" style="display:flex; justify-content: space-between; margin: 20px 5px 5px; align-items:center;">
        <input type="month" id="month-view" style="border:none; font-size:0.75rem; color:#999; background:transparent;" onchange="render()">
        <span style="font-size:0.6rem; color:#eee; cursor:pointer;" onclick="exportData()">EXPORT CSV</span>
    </div>

    <div id="list-container"></div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('linshop_v2')) || [];
    let myBudget = localStorage.getItem('linshop_budget') || 20000;
    
    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('month-view').value = new Date().toISOString().slice(0, 7);

    function uiSwitch() {
        const type = document.getElementById('type').value;
        const isTr = type === 'transfer';
        document.getElementById('to-acc-col').style.display = isTr ? 'block' : 'none';
        document.getElementById('category').disabled = isTr;
        document.getElementById('acc-label').innerText = isTr ? 'FROM' : 'ACCOUNT';
    }

    function setBudget() {
        const b = prompt("Monthly Budget:", myBudget);
        if (b) { myBudget = b; localStorage.setItem('linshop_budget', b); render(); }
    }

    function addRecord() {
        const amt = parseFloat(document.getElementById('amount').value);
        if (isNaN(amt)) return alert("請輸入金額");
        
        const r = {
            id: Date.now(),
            date: document.getElementById('date').value,
            type: document.getElementById('type').value,
            acc: document.getElementById('account').value,
            toAcc: document.getElementById('to-account').value,
            cat: document.getElementById('category').value,
            name: document.getElementById('name').value || "無備註",
            amt: amt
        };
        records.push(r);
        save();
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
    }

    function save() {
        records.sort((a,b) => b.date.localeCompare(a.date));
        localStorage.setItem('linshop_v2', JSON.stringify(records));
        render();
    }

    function render() {
        const container = document.getElementById('list-container');
        const viewMonth = document.getElementById('month-view').value;
        container.innerHTML = '';

        let bals = { fubon:0, next:0, feib:0, cash:0 };
        let mInc = 0, mExp = 0, catStats = {};

        records.forEach(r => {
            if (r.type === 'income') bals[r.acc] += r.amt;
            else if (r.type === 'expense') bals[r.acc] -= r.amt;
            else { bals[r.acc] -= r.amt; bals[r.toAcc] += r.amt; }

            if (r.date.startsWith(viewMonth)) {
                if (r.type === 'income') mInc += r.amt;
                else if (r.type === 'expense') { mExp += r.amt; catStats[r.cat] = (catStats[r.cat] || 0) + r.amt; }

                const item = document.createElement('div');
                item.className = 'record-item';
                const emoji = r.type === 'transfer' ? '⇄' : r.cat.split(' ')[0];
                item.innerHTML = `
                    <div class="icon-box">${emoji}</div>
                    <div class="content" style="flex:1">
                        <h4>${r.name}</h4>
                        <p>${getAccName(r.acc)} · ${r.date.slice(8)}日</p>
                    </div>
                    <div class="price ${r.type}">${r.type === 'income' ? '+' : (r.type === 'transfer' ? '' : '-')}${r.amt.toLocaleString()}</div>
                `;
                container.appendChild(item);
            }
        });

        document.getElementById('total-balance').innerText = `$ ${(mInc - mExp).toLocaleString()}`;
        document.getElementById('total-income').innerText = `$ ${mInc.toLocaleString()}`;
        document.getElementById('total-expense').innerText = `$ ${mExp.toLocaleString()}`;
        
        document.getElementById('dash-box').className = (mExp / myBudget) * 100 >= 100 ? 'dashboard budget-warning' : 'dashboard';
        ['fubon', 'next', 'feib', 'cash'].forEach(k => document.getElementById(`acc-${k}`).innerText = `$${bals[k].toLocaleString()}`);

        drawChart(catStats);
    }

    function getAccName(k) { return { fubon: '富邦', next: '將來', feib: '遠東', cash: '現金' }[k]; }

    function drawChart(stats) {
        const canvas = document.getElementById('miniChart');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 50, 50);
        let total = Object.values(stats).reduce((a,b) => a+b, 0);
        if (total === 0) return;
        let start = 0, colors = ['#eee', '#b8c6db', '#dcdcdc', '#e5e5e5', '#d1a7a7'];
        Object.values(stats).forEach((v, i) => {
            let slice = (v / total) * 2 * Math.PI;
            ctx.beginPath(); ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(25, 25); ctx.arc(25, 25, 24, start, start + slice); ctx.fill();
            start += slice;
        });
        ctx.beginPath(); ctx.fillStyle = document.getElementById('dash-box').classList.contains('budget-warning') ? "#c2948a" : "#9fa9a3";
        ctx.arc(25, 25, 14, 0, 2 * Math.PI); ctx.fill();
    }

    function exportData() {
        let csv = "\ufeffDATE,ITEM,CAT,AMT,ACC\n";
        records.forEach(r => csv += `${r.date},${r.name},${r.cat},${r.amt},${getAccName(r.acc)}\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'LinShop.csv'; a.click();
    }
    render();
</script>
</body>
</html>
