<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinShop Ledger ⟡</title>
    <style>
        :root { 
            --bg: #f8f9fb; 
            --main: #9cb1cc; 
            --sub: #b7a9c4;  
            --text: #6b7280; 
            --accent: #d4a5a5; 
            --income: #9bbca9; 
        }

        body { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        /* 稍微調寬容器，讓排版更有呼吸感 */
        .container { 
            width: 100%; max-width: 480px; background: white; border-radius: 40px; padding: 35px; 
            box-shadow: 0 25px 60px rgba(156, 177, 204, 0.15); 
            position: relative; overflow: hidden;
        }

        .deco-top {
            position: absolute; top: 20px; right: 25px; font-size: 1.5rem; color: var(--main);
            opacity: 0.4; pointer-events: none; letter-spacing: -3px;
        }

        h2 { text-align: center; font-weight: 300; color: var(--main); letter-spacing: 8px; font-size: 1.2rem; margin: 15px 0 30px; }

        .dashboard { 
            background: linear-gradient(135deg, var(--main), var(--sub)); 
            color: white; padding: 35px 25px; border-radius: 30px; text-align: center; margin-bottom: 30px; 
            box-shadow: 0 12px 30px rgba(156, 177, 204, 0.25);
        }
        .dash-label { font-size: 0.75rem; opacity: 0.9; letter-spacing: 3px; margin-bottom: 12px; font-weight: bold; }
        .dash-val { font-size: 2.5rem; font-weight: 200; }

        /* 帳戶資訊卡片調整 */
        .acc-row { display: flex; gap: 15px; overflow-x: auto; margin-bottom: 30px; scrollbar-width: none; padding: 5px; }
        .acc-card { flex: 1; min-width: 100px; background: #ffffff; padding: 18px 10px; border-radius: 22px; border: 1.8px solid #f1f4f8; text-align: center; transition: 0.3s; }
        .acc-name { font-size: 0.7rem; color: #b2b9c4; display: block; margin-bottom: 8px; font-weight: bold; }
        .acc-bal { font-size: 0.85rem; color: var(--sub); font-weight: 800; }

        /* 輸入區域寬度與對齊優化 */
        .input-box { background: #fcfdfe; padding: 25px; border-radius: 32px; border: 1.8px solid #f1f4f8; margin-bottom: 30px; }
        
        .type-toggle { display: flex; background: #ecedf2; border-radius: 18px; margin-bottom: 22px; padding: 5px; }
        .type-toggle label { flex: 1; text-align: center; padding: 12px 0; font-size: 0.85rem; cursor: pointer; border-radius: 14px; transition: 0.3s; color: #a1a8b5; }
        .type-toggle input:checked + label { background: white; color: var(--main); font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .type-toggle input { display: none; }

        /* 讓欄位看起來更整齊的 Grid 排版 */
        .field-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 15px; margin-bottom: 18px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.65rem; color: #c0c5d0; margin-bottom: 8px; padding-left: 12px; font-weight: bold; letter-spacing: 1.5px; }
        input, select { height: 48px; border: 2px solid #eff2f6; border-radius: 16px; padding: 0 18px; font-size: 0.9rem; outline: none; background: white; color: var(--text); transition: 0.2s; }
        input:focus { border-color: var(--main); box-shadow: 0 0 0 4px rgba(156, 177, 204, 0.1); }
        
        .btn { width: 100%; height: 56px; background: var(--main); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 1rem; margin-top: 12px; font-weight: bold; letter-spacing: 4px; box-shadow: 0 8px 25px rgba(156, 177, 204, 0.3); transition: 0.3s; }
        .btn:active { transform: scale(0.98); background: var(--sub); }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 12px; }
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 12px; border-bottom: 1.5px solid #f9fafb; transition: 0.2s; }
        .record-item:hover { background-color: #fcfdfe; border-radius: 15px; }
        .price { font-weight: 600; font-size: 1.1rem; letter-spacing: 0.5px; }
        .p-red { color: var(--accent); }
        .p-green { color: var(--income); }
        
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--sub); color: white; padding: 14px 35px; border-radius: 50px; font-size: 0.9rem; opacity: 0; transition: 0.5s; z-index: 100; box-shadow: 0 15px 35px rgba(183, 169, 196, 0.3); }
        .toast.show { opacity: 1; top: 50px; }

        .sync-btn { font-size: 0.8rem; color: var(--main); cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; background: #f0f4f8; padding: 10px 18px; border-radius: 22px; transition: 0.3s; }
        .sync-btn:hover { background: #e6ecf3; }
    </style>
</head>
<body>

<div id="toast" class="toast">運作中...</div>

<div class="container">
    <div class="deco-top">⟡ ⟡ ⟡</div>

    <h2>LINSHOP LEDGER ⟡</h2>

    <div class="dashboard">
        <div class="dash-label">⋆ TOTAL BALANCE ⋆</div>
        <div id="m-total" class="dash-val">$ 0</div>
    </div>

    <div class="acc-row">
        <div class="acc-card"><span class="acc-name">富邦</span><span class="acc-bal" id="b-富邦銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">將來</span><span class="acc-bal" id="b-將來銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">遠東</span><span class="acc-bal" id="b-遠東銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">現金</span><span class="acc-bal" id="b-手邊現金">$0</span></div>
    </div>

    <div class="input-box">
        <div class="type-toggle">
            <input type="radio" name="trType" id="typeExp" value="exp" checked>
            <label for="typeExp">支出 ☕</label>
            <input type="radio" name="trType" id="typeInc" value="inc">
            <label for="typeInc">收入 🎀</label>
        </div>

        <div class="field-grid">
            <div class="field"><label>DATE</label><input type="date" id="date"></div>
            <div class="field"><label>ACCOUNT</label>
                <select id="acc">
                    <option>富邦銀行</option><option>將來銀行</option><option>遠東銀行</option><option>手邊現金</option>
                </select>
            </div>
        </div>
        <div class="field-grid">
            <div class="field"><label>CATEGORY</label>
                <select id="cat">
                    <option>🍱 餐飲</option><option>📦 代購</option><option>🚗 交通</option><option>✨ 娛樂</option><option>💰 薪資</option><option>🛒 雜項</option>
                </select>
            </div>
            <div class="field"><label>AMOUNT</label><input type="number" id="amt" placeholder="$"></div>
        </div>
        <div class="field" style="margin-top: 10px;"><label>MEMO</label><input type="text" id="name" placeholder="想記點什麼呢... ✎"></div>
        <button class="btn" onclick="add()">新增紀錄 🐾</button>
    </div>

    <div class="list-header">
        <input type="month" id="view-m" onchange="render()" style="border:none; background:transparent; color:#b0b5c0; font-size: 0.95rem; outline: none; cursor: pointer; font-weight: bold;">
        <div class="sync-btn" onclick="sync()">
            <span>🥣</span> 同步雲端
        </div>
    </div>

    <div id="list"></div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbzp0uI5lHJjZoevHdwDch_oKEtzilqOP82WO0C5JBvYjeUshGFE8f5A82AOR3w764RH/exec';
    let records = JSON.parse(localStorage.getItem('ls_v8')) || [];

    const today = new Date();
    document.getElementById('date').valueAsDate = today;
    document.getElementById('view-m').value = today.toISOString().slice(0, 7);

    function showMsg(text) { 
        const t = document.getElementById('toast'); 
        t.innerText = text; t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 3000); 
    }

    function sync() {
        showMsg("正在與雲端連線中... ☁️");
        const old = document.getElementById('jsonp-script');
        if (old) old.remove();
        const s = document.createElement('script');
        s.id = 'jsonp-script';
        s.src = `${API}?callback=handleResponse&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function handleResponse(data) {
        if (Array.isArray(data)) {
            records = data;
            localStorage.setItem('ls_v8', JSON.stringify(records));
            render();
            showMsg(`同步成功！(共 ${data.length} 筆)`);
        }
    }

    function render() {
        const list = document.getElementById('list');
        const viewMonth = document.getElementById('view-m').value;
        list.innerHTML = '';
        
        let mTotal = 0;
        let bals = {'富邦銀行':0, '將來銀行':0, '遠東銀行':0, '手邊現金':0};

        records.sort((a,b) => new Date(b.date) - new Date(a.date));

        records.forEach(r => {
            const val = parseFloat(r.amt) || 0;
            if (bals.hasOwnProperty(r.acc)) bals[r.acc] += val;

            if (String(r.date).includes(viewMonth)) {
                mTotal += val;
                const isInc = val >= 0;
                list.innerHTML += `
                    <div class="record-item">
                        <div style="flex:1">
                            <div style="font-size:0.95rem; margin-bottom:6px; color:#4a4a4a; font-weight:500;">${r.name}</div>
                            <div style="font-size:0.7rem; color:#b0b5c0; letter-spacing:0.5px;">${r.acc} · ${String(r.date).slice(5)}</div>
                        </div>
                        <div class="price ${isInc ? 'p-green' : 'p-red'}">
                            ${isInc ? '+' : ''}${val.toLocaleString()}
                        </div>
                    </div>`;
            }
        });

        document.getElementById('m-total').innerText = `$ ${mTotal.toLocaleString()}`;
        for (let key in bals) {
            const el = document.getElementById('b-' + key);
            if (el) el.innerText = `$${Math.round(bals[key]).toLocaleString()}`;
        }
    }

    function add() {
        const amtInput = document.getElementById('amt');
        const nameInput = document.getElementById('name');
        const isExp = document.getElementById('typeExp').checked;
        
        if (!amtInput.value) return alert("要記得輸入金額喔！(๑•́ ₃ •̀๑)");

        let finalAmt = parseFloat(amtInput.value);
        finalAmt = isExp ? -Math.abs(finalAmt) : Math.abs(finalAmt);

        const r = {
            date: document.getElementById('date').value,
            acc: document.getElementById('acc').value,
            cat: document.getElementById('cat').value,
            name: nameInput.value || (isExp ? "一般支出" : "一般收入"),
            amt: finalAmt
        };

        records.push(r);
        render();

        fetch(API, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(r)
        }).then(() => {
            showMsg("已成功餵食雲端 ✧");
            amtInput.value = '';
            nameInput.value = '';
        });
    }

    window.onload = sync;
</script>
</body>
</html>
