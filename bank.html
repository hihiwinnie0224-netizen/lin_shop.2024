<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務管理系統 | LinShop 𖤣𖥧</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --text-main: #5d5d5d;
            --accent-blue: #9eb3c2;
            --accent-green: #a3b18a;
            --accent-orange: #e09f7d;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        h2 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; }

        .total-summary {
            display: flex;
            justify-content: space-around;
            background: #5d5d5d;
            color: white;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-item span { font-size: 0.75rem; opacity: 0.8; display: block; margin-bottom: 5px; }
        .summary-item b { font-size: 1.1rem; letter-spacing: 1px; }

        .account-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .acc-box {
            padding: 10px 5px;
            border-radius: 12px;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            text-align: center;
        }

        .acc-name { font-size: 0.65rem; color: #aaa; display: block; }
        .acc-val { font-size: 0.85rem; font-weight: bold; margin-top: 3px; }

        .input-card {
            background: #fafafa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .form-row { margin-bottom: 12px; }
        label { font-size: 0.8rem; color: #888; margin-bottom: 4px; display: block; }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
        }

        .btn-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .cat-btn { padding: 5px 10px; background: white; border: 1px solid #eee; border-radius: 15px; font-size: 0.75rem; cursor: pointer; }
        .cat-btn:hover { background: var(--accent-blue); color: white; }

        .btn-submit { width: 100%; padding: 15px; background: var(--accent-green); color: white; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        .list-header { font-size: 0.9rem; color: #999; margin: 20px 0 10px; padding-left: 5px; border-left: 3px solid var(--accent-blue); }

        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #f8f8f8; }
        .item-main { flex: 1; }
        .item-date { font-size: 0.7rem; color: #bbb; display: block; }
        .item-tag { font-size: 0.75rem; color: var(--accent-blue); font-weight: bold; }
        .item-name { font-size: 0.95rem; margin-left: 5px; }
        .item-price { font-weight: bold; margin-right: 12px; }
        .income { color: var(--accent-green); }
        .expense { color: var(--accent-orange); }

        .action-btns button { background: none; border: none; cursor: pointer; color: #ddd; padding: 5px; }
        .action-btns .edit:hover { color: var(--accent-blue); }
        .action-btns .del:hover { color: #ffab91; }
    </style>
</head>
<body>

<div class="container">
    <h2>Financial Ledger ⟡</h2>

    <div class="total-summary">
        <div class="summary-item"><span>總收入</span><b id="grand-income">$ 0</b></div>
        <div class="summary-item"><span>總支出</span><b id="grand-expense">$ 0</b></div>
        <div class="summary-item"><span>結餘</span><b id="grand-balance">$ 0</b></div>
    </div>

    <div class="account-grid">
        <div class="acc-box"><span class="acc-name">富邦</span><span class="acc-val" id="bal-fubon">$0</span></div>
        <div class="acc-box"><span class="acc-name">將來</span><span class="acc-val" id="bal-next">$0</span></div>
        <div class="acc-box"><span class="acc-name">遠東</span><span class="acc-val" id="bal-feib">$0</span></div>
        <div class="acc-box"><span class="acc-name">現金</span><span class="acc-val" id="bal-cash">$0</span></div>
    </div>

    <div class="input-card">
        <div class="form-row">
            <label>日期</label>
            <input type="date" id="date">
        </div>
        <div class="form-row">
            <div style="display: flex; gap: 8px;">
                <select id="account" style="flex: 2;">
                    <option value="fubon">富邦銀行</option>
                    <option value="next">將來銀行</option>
                    <option value="feib">遠東銀行</option>
                    <option value="cash">手邊現金</option>
                </select>
                <select id="type" style="flex: 1;">
                    <option value="expense">支出 (-)</option>
                    <option value="income">收入 (+)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <input type="text" id="name" placeholder="項目名稱">
            <div class="btn-list">
                <button class="cat-btn" onclick="quickSet('📦 代購採購', 'expense')">代購採購</button>
                <button class="cat-btn" onclick="quickSet('💰 薪資收入', 'income')">薪資收入</button>
                <button class="cat-btn" onclick="quickSet('✨ 微風南山', 'expense')">微風南山</button>
                <button class="cat-btn" onclick="quickSet('🛋️ IKEA', 'expense')">IKEA</button>
                <button class="cat-btn" onclick="quickSet('🍱 午餐/晚餐', 'expense')">午/晚餐</button>
                <button class="cat-btn" onclick="quickSet('🏧 ATM 提款', 'expense')">ATM 提款</button>
            </div>
        </div>

        <div class="form-row">
            <input type="number" id="amount" placeholder="金額">
        </div>

        <button id="main-btn" class="btn-submit" onclick="processRecord()">確認新增紀錄</button>
    </div>

    <div class="list-header">收支明細 (按日期自動排序)</div>
    <div id="record-list"></div>
</div>

<script>
    // 從 LocalStorage 讀取資料
    let records = JSON.parse(localStorage.getItem('linshop_ledger')) || [];
    let editingId = null;

    // 預設日期為今天
    document.getElementById('date').valueAsDate = new Date();

    function quickSet(name, type) {
        document.getElementById('name').value = name;
        document.getElementById('type').value = type;
    }

    function processRecord() {
        const date = document.getElementById('date').value;
        const acc = document.getElementById('account').value;
        const type = document.getElementById('type').value;
        const name = document.getElementById('name').value;
        const amt = parseFloat(document.getElementById('amount').value);

        if (!date || !name || isNaN(amt)) return alert('請完整填寫日期、項目與金額 ‧ᴗ •');

        if (editingId) {
            const idx = records.findIndex(r => r.id === editingId);
            records[idx] = { ...records[idx], date, acc, type, name, amount: amt };
            editingId = null;
            document.getElementById('main-btn').innerText = '確認新增紀錄';
            document.getElementById('main-btn').style.background = 'var(--accent-green)';
        } else {
            records.push({ id: Date.now(), date, acc, type, name, amount: amt });
        }

        saveAndRender();
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
    }

    function editRecord(id) {
        const r = records.find(item => item.id === id);
        editingId = id;
        document.getElementById('date').value = r.date;
        document.getElementById('account').value = r.acc;
        document.getElementById('type').value = r.type;
        document.getElementById('name').value = r.name;
        document.getElementById('amount').value = r.amount;
        document.getElementById('main-btn').innerText = '儲存修改內容';
        document.getElementById('main-btn').style.background = 'var(--accent-blue)';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteRecord(id) {
        if (confirm('確定要刪除這筆紀錄嗎？')) {
            records = records.filter(r => r.id !== id);
            saveAndRender();
        }
    }

    function saveAndRender() {
        // 排序：先比日期 (晚到早)，日期相同比 ID (晚到早)
        records.sort((a, b) => {
            if (a.date !== b.date) {
                return b.date.localeCompare(a.date);
            }
            return b.id - a.id;
        });

        localStorage.setItem('linshop_ledger', JSON.stringify(records));
        render();
    }

    function render() {
        const list = document.getElementById('record-list');
        list.innerHTML = '';
        
        let bals = { fubon: 0, next: 0, feib: 0, cash: 0 };
        let totalInc = 0;
        let totalExp = 0;

        records.forEach(r => {
            const isInc = r.type === 'income';
            bals[r.acc] += isInc ? r.amount : -r.amount;
            if(isInc) totalInc += r.amount; else totalExp += r.amount;

            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <div class="item-main">
                    <span class="item-date">${r.date}</span>
                    <span class="item-tag">[${getAcc(r.acc)}]</span>
                    <span class="item-name">${r.name}</span>
                </div>
                <div class="item-price ${isInc ? 'income' : 'expense'}">
                    ${isInc ? '+' : '-'}${r.amount.toLocaleString()}
                </div>
                <div class="action-btns">
                    <button class="edit" onclick="editRecord(${r.id})">✎</button>
                    <button class="del" onclick="deleteRecord(${r.id})">✕</button>
                </div>
            `;
            list.appendChild(div);
        });

        for (let key in bals) {
            document.getElementById(`bal-${key}`).innerText = `$${bals[key].toLocaleString()}`;
        }
        document.getElementById('grand-income').innerText = `$ ${totalInc.toLocaleString()}`;
        document.getElementById('grand-expense').innerText = `$ ${totalExp.toLocaleString()}`;
        document.getElementById('grand-balance').innerText = `$ ${(totalInc - totalExp).toLocaleString()}`;
    }

    function getAcc(key) {
        const m = { fubon: '富邦', next: '將來', feib: '遠東', cash: '現金' };
        return m[key];
    }

    // 初始渲染
    render();
</script>

</body>
</html>
