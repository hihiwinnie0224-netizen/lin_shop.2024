<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinShop Ledger ⟡</title>
    <style>
        :root { 
            --bg: #f8f9fb; 
            --main: #9cb1cc; 
            --sub: #b7a9c4;  
            --text: #4a4a4a; 
            --light-text: #b0b5c0;
            --accent: #d4a5a5; 
            --income: #9bbca9; 
        }

        /* 移除手機端點擊灰調 */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
        }
        
        .container { 
            width: 100%; 
            max-width: 480px; 
            background: white; 
            border-radius: 35px; 
            padding: 20px; 
            box-shadow: 0 15px 40px rgba(156, 177, 204, 0.12); 
            position: relative;
        }

        h2 { text-align: center; font-weight: 300; color: var(--main); letter-spacing: 6px; font-size: 1.1rem; margin: 10px 0 20px; }

        /* Dashboard 加大字體方便閱讀 */
        .dashboard { 
            background: linear-gradient(135deg, var(--main), var(--sub)); 
            color: white; padding: 30px 20px; border-radius: 28px; text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(156, 177, 204, 0.2);
        }
        .dash-label { font-size: 0.7rem; opacity: 0.9; letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }
        .dash-val { font-size: 2.2rem; font-weight: 300; }

        /* 帳戶列：手機端支援橫向滑動 */
        .acc-row { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            margin-bottom: 20px; 
            padding: 5px 2px;
            -webkit-overflow-scrolling: touch; /* iOS 滑動順暢 */
        }
        .acc-row::-webkit-scrollbar { display: none; } /* 隱藏捲軸 */

        .acc-card { 
            min-width: 100px; 
            flex: 0 0 auto; 
            background: #ffffff; 
            padding: 15px 10px; 
            border-radius: 20px; 
            border: 1.5px solid #f1f3f6; 
            text-align: center; 
        }
        .acc-name { font-size: 0.65rem; color: var(--light-text); display: block; margin-bottom: 5px; font-weight: bold; }
        .acc-bal { font-size: 0.8rem; color: var(--sub); font-weight: 800; }

        .input-box { background: #fcfdfe; padding: 20px; border-radius: 28px; border: 1.5px solid #f1f3f6; margin-bottom: 20px; }
        
        /* 選項切換加大 */
        .type-toggle { display: flex; background: #ecedf2; border-radius: 15px; margin-bottom: 18px; padding: 4px; }
        .type-toggle label { flex: 1; text-align: center; padding: 12px 0; font-size: 0.9rem; cursor: pointer; border-radius: 12px; transition: 0.2s; color: #a1a8b5; }
        .type-toggle input:checked + label { background: white; color: var(--main); font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .type-toggle input { display: none; }

        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.65rem; color: var(--light-text); margin-bottom: 6px; padding-left: 10px; font-weight: bold; }
        
        /* 手機端輸入框高度優化 */
        input, select { 
            height: 52px; 
            border: 1.8px solid #eff1f5; 
            border-radius: 15px; 
            padding: 0 15px; 
            font-size: 1rem; /* 防止 iOS 自動放大畫面 */
            outline: none; 
            background: white; 
            color: var(--text); 
            -webkit-appearance: none; /* 移除 iOS 預設樣式 */
        }
        input:focus { border-color: var(--main); }
        
        /* 適合單手操作的大按鈕 */
        .btn { 
            width: 100%; 
            height: 56px; 
            background: var(--main); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            cursor: pointer; 
            font-size: 1.05rem; 
            margin-top: 5px; 
            font-weight: bold; 
            letter-spacing: 3px; 
            box-shadow: 0 6px 20px rgba(156, 177, 204, 0.25); 
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        
        /* 列表項目加大方便點擊查看 */
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 10px; border-bottom: 1.5px solid #f9fafb; }
        .price { font-weight: 600; font-size: 1.1rem; }
        .p-red { color: var(--accent); }
        .p-green { color: var(--income); }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--sub); color: white; padding: 12px 30px; border-radius: 50px; font-size: 0.9rem; opacity: 0; transition: 0.4s; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.1); pointer-events: none; }
        .toast.show { opacity: 1; bottom: 50px; }

        .sync-btn { font-size: 0.8rem; color: var(--main); cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: bold; background: #f0f3f7; padding: 8px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="toast" class="toast">運作中...</div>

<div class="container">
    <h2>LINSHOP LEDGER ⟡</h2>

    <div class="dashboard">
        <div class="dash-label">⋆ TOTAL BALANCE ⋆</div>
        <div id="m-total" class="dash-val">$ 0</div>
    </div>

    <div class="acc-row">
        <div class="acc-card"><span class="acc-name">富邦</span><span class="acc-bal" id="b-富邦銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">將來</span><span class="acc-bal" id="b-將來銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">遠東</span><span class="acc-bal" id="b-遠東銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">現金</span><span class="acc-bal" id="b-手邊現金">$0</span></div>
    </div>

    <div class="input-box">
        <div class="type-toggle">
            <input type="radio" name="trType" id="typeExp" value="exp" checked>
            <label for="typeExp">支出 ☕</label>
            <input type="radio" name="trType" id="typeInc" value="inc">
            <label for="typeInc">收入 🎀</label>
        </div>

        <div class="field-grid">
            <div class="field"><label>日期</label><input type="date" id="date"></div>
            <div class="field"><label>帳戶</label>
                <select id="acc">
                    <option>富邦銀行</option><option>將來銀行</option><option>遠東銀行</option><option>手邊現金</option>
                </select>
            </div>
        </div>
        <div class="field-grid">
            <div class="field"><label>類別</label>
                <select id="cat">
                    <option>🍱 餐飲</option><option>📦 代購</option><option>🚗 交通</option><option>✨ 娛樂</option><option>💰 薪資</option><option>🛒 雜項</option>
                </select>
            </div>
            <div class="field"><label>金額</label><input type="number" id="amt" pattern="[0-9]*" inputmode="decimal" placeholder="$"></div>
        </div>
        <div class="field" style="margin-top: 10px;"><label>備註</label><input type="text" id="name" placeholder="想記點什麼呢... ✎"></div>
        <button class="btn" onclick="add()">新增紀錄 🐾</button>
    </div>

    <div class="list-header">
        <input type="month" id="view-m" onchange="render()" style="border:none; background:transparent; color:#b0b5c0; font-size: 0.9rem; outline: none; cursor: pointer; font-weight: bold;">
        <div class="sync-btn" onclick="sync()">
            <span>🥣</span> 同步雲端
        </div>
    </div>

    <div id="list"></div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbzp0uI5lHJjZoevHdwDch_oKEtzilqOP82WO0C5JBvYjeUshGFE8f5A82AOR3w764RH/exec';
    let records = JSON.parse(localStorage.getItem('ls_v8')) || [];

    const today = new Date();
    document.getElementById('date').valueAsDate = today;
    document.getElementById('view-m').value = today.toISOString().slice(0, 7);

    function showMsg(text) { 
        const t = document.getElementById('toast'); 
        t.innerText = text; t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 3000); 
    }

    function sync() {
        showMsg("連線中... ☁️");
        const old = document.getElementById('jsonp-script');
        if (old) old.remove();
        const s = document.createElement('script');
        s.id = 'jsonp-script';
        s.src = `${API}?callback=handleResponse&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function handleResponse(data) {
        if (Array.isArray(data)) {
            records = data;
            localStorage.setItem('ls_v8', JSON.stringify(records));
            render();
            showMsg(`同步成功 ✧`);
        }
    }

    function render() {
        const list = document.getElementById('list');
        const viewMonth = document.getElementById('view-m').value;
        list.innerHTML = '';
        
        let mTotal = 0;
        let bals = {'富邦銀行':0, '將來銀行':0, '遠東銀行':0, '手邊現金':0};

        records.sort((a,b) => new Date(b.date) - new Date(a.date));

        records.forEach(r => {
            const val = parseFloat(r.amt) || 0;
            if (bals.hasOwnProperty(r.acc)) bals[r.acc] += val;

            if (String(r.date).includes(viewMonth)) {
                mTotal += val;
                const isInc = val >= 0;
                list.innerHTML += `
                    <div class="record-item">
                        <div style="flex:1">
                            <div style="font-size:1rem; margin-bottom:5px; color:#444; font-weight:500;">${r.name}</div>
                            <div style="font-size:0.75rem; color:#b0b5c0;">${r.acc} · ${String(r.date).slice(5)}</div>
                        </div>
                        <div class="price ${isInc ? 'p-green' : 'p-red'}">
                            ${isInc ? '+' : ''}${val.toLocaleString()}
                        </div>
                    </div>`;
            }
        });

        document.getElementById('m-total').innerText = `$ ${mTotal.toLocaleString()}`;
        for (let key in bals) {
            const el = document.getElementById('b-' + key);
            if (el) el.innerText = `$${Math.round(bals[key]).toLocaleString()}`;
        }
    }

    function add() {
        const amtInput = document.getElementById('amt');
        const nameInput = document.getElementById('name');
        const isExp = document.getElementById('typeExp').checked;
        
        if (!amtInput.value) return alert("忘了輸入金額唷！(๑•́ ₃ •̀๑)");

        let finalAmt = parseFloat(amtInput.value);
        finalAmt = isExp ? -Math.abs(finalAmt) : Math.abs(finalAmt);

        const r = {
            date: document.getElementById('date').value,
            acc: document.getElementById('acc').value,
            cat: document.getElementById('cat').value,
            name: nameInput.value || (isExp ? "一般支出" : "一般收入"),
            amt: finalAmt
        };

        records.push(r);
        render();

        fetch(API, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(r)
        }).then(() => {
            showMsg("已存入雲端 ✧");
            amtInput.value = '';
            nameInput.value = '';
        });
    }

    window.onload = sync;
</script>
</body>
</html>
  
按「預覽」可查看輸入後的效果 ；按「拷貝」可將程式碼剪下貼用 。
