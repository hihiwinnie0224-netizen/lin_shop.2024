<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務管理總覽 | LinShop 𖤣𖥧</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --text-main: #5d5d5d;
            --accent-blue: #9eb3c2;
            --accent-green: #a3b18a;
            --accent-orange: #e09f7d;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        h2 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; }

        /* 總計加總區塊 */
        .total-summary {
            display: flex;
            justify-content: space-around;
            background: #5d5d5d;
            color: white;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-item span { font-size: 0.75rem; opacity: 0.8; display: block; margin-bottom: 5px; }
        .summary-item b { font-size: 1.2rem; letter-spacing: 1px; }

        /* 各銀行帳戶看板 */
        .account-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .acc-box {
            padding: 10px 5px;
            border-radius: 12px;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            text-align: center;
        }

        .acc-name { font-size: 0.65rem; color: #aaa; display: block; }
        .acc-val { font-size: 0.85rem; font-weight: bold; margin-top: 3px; display: block; }

        /* 輸入區域 */
        .input-card {
            background: #fafafa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .form-row { margin-bottom: 15px; }
        label { font-size: 0.85rem; color: #888; margin-bottom: 5px; display: block; }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        /* 類別快速按鈕區 */
        .category-group { margin-bottom: 15px; }
        .group-title { font-size: 0.75rem; color: #999; margin-bottom: 8px; border-left: 3px solid var(--accent-blue); padding-left: 8px; }
        .btn-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .cat-btn { padding: 6px 12px; background: white; border: 1px solid #eee; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .cat-btn:hover { background: var(--accent-blue); color: white; }

        .btn-submit { width: 100%; padding: 15px; background: var(--accent-green); color: white; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        /* 紀錄明細 */
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #f8f8f8; }
        .item-main { flex: 1; }
        .item-tag { font-size: 0.7rem; color: #bbb; display: block; }
        .item-price { font-weight: bold; margin-right: 15px; }
        .income { color: var(--accent-green); }
        .expense { color: var(--accent-orange); }

        .action-btns button { background: none; border: none; cursor: pointer; color: #ddd; padding: 5px; }
        .action-btns .edit:hover { color: var(--accent-blue); }
        .action-btns .del:hover { color: #ffab91; }
    </style>
</head>
<body>

<div class="container">
    <h2>Financial Ledger ⟡</h2>

    <div class="total-summary">
        <div class="summary-item">
            <span>總收入合計</span>
            <b id="grand-income">$ 0</b>
        </div>
        <div class="summary-item">
            <span>總支出合計</span>
            <b id="grand-expense">$ 0</b>
        </div>
        <div class="summary-item">
            <span>總結餘</span>
            <b id="grand-balance">$ 0</b>
        </div>
    </div>

    <div class="account-grid">
        <div class="acc-box"><span class="acc-name">富邦</span><span class="acc-val" id="bal-fubon">$0</span></div>
        <div class="acc-box"><span class="acc-name">將來</span><span class="acc-val" id="bal-next">$0</span></div>
        <div class="acc-box"><span class="acc-name">遠東</span><span class="acc-val" id="bal-feib">$0</span></div>
        <div class="acc-box"><span class="acc-name">現金</span><span class="acc-val" id="bal-cash">$0</span></div>
    </div>

    <div class="input-card">
        <div class="form-row">
            <div style="display: flex; gap: 8px;">
                <select id="account" style="flex: 2;">
                    <option value="fubon">富邦銀行</option>
                    <option value="next">將來銀行</option>
                    <option value="feib">遠東銀行</option>
                    <option value="cash">手邊現金</option>
                </select>
                <select id="type" style="flex: 1;">
                    <option value="expense">支出 (-)</option>
                    <option value="income">收入 (+)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <input type="text" id="name" placeholder="項目名稱 (或從下方選取)">
            <div style="margin-top: 10px;">
                <div class="category-group">
                    <div class="group-title">🏢 商業與收入</div>
                    <div class="btn-list">
                        <button class="cat-btn" onclick="quickSet('📦 代購採購', 'expense')">代購採購</button>
                        <button class="cat-btn" onclick="quickSet('💰 薪資收入', 'income')">薪資收入</button>
                    </div>
                </div>
                <div class="category-group">
                    <div class="group-title">🛍️ 購物與生活</div>
                    <div class="btn-list">
                        <button class="cat-btn" onclick="quickSet('✨ 微風南山', 'expense')">微風南山</button>
                        <button class="cat-btn" onclick="quickSet('🛋️ IKEA', 'expense')">IKEA</button>
                        <button class="cat-btn" onclick="quickSet('🍱 午餐/晚餐', 'expense')">午/晚餐</button>
                        <button class="cat-btn" onclick="quickSet('☕ 咖啡飲品', 'expense')">咖啡飲品</button>
                        <button class="cat-btn" onclick="quickSet('🏧 ATM 提款', 'expense')">ATM 提款</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <input type="number" id="amount" placeholder="金額">
        </div>

        <button id="main-btn" class="btn-submit" onclick="processRecord()">確認新增紀錄</button>
    </div>

    <div id="record-list"></div>
</div>

<script>
    let records = [];
    let editingId = null;

    function quickSet(name, type) {
        document.getElementById('name').value = name;
        document.getElementById('type').value = type;
    }

    function processRecord() {
        const acc = document.getElementById('account').value;
        const type = document.getElementById('type').value;
        const name = document.getElementById('name').value;
        const amt = parseFloat(document.getElementById('amount').value);

        if (!name || isNaN(amt)) return alert('請完整填寫項目與金額 ‧ᴗ‧');

        if (editingId) {
            const idx = records.findIndex(r => r.id === editingId);
            records[idx] = { ...records[idx], acc, type, name, amount: amt };
            editingId = null;
            document.getElementById('main-btn').innerText = '確認新增紀錄';
            document.getElementById('main-btn').style.background = 'var(--accent-green)';
        } else {
            records.push({ id: Date.now(), acc, type, name, amount: amt, date: new Date().toLocaleDateString() });
        }

        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
        render();
    }

    function editRecord(id) {
        const r = records.find(item => item.id === id);
        editingId = id;
        document.getElementById('account').value = r.acc;
        document.getElementById('type').value = r.type;
        document.getElementById('name').value = r.name;
        document.getElementById('amount').value = r.amount;
        document.getElementById('main-btn').innerText = '儲存修改內容';
        document.getElementById('main-btn').style.background = 'var(--accent-blue)';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteRecord(id) {
        if (confirm('確定要刪除這筆紀錄嗎？')) {
            records = records.filter(r => r.id !== id);
            render();
        }
    }

    function render() {
        const list = document.getElementById('record-list');
        list.innerHTML = '';
        
        let bals = { fubon: 0, next: 0, feib: 0, cash: 0 };
        let totalInc = 0;
        let totalExp = 0;

        records.sort((a,b) => b.id - a.id).forEach(r => {
            const isInc = r.type === 'income';
            const val = r.amount;

            // 銀行個別計算
            bals[r.acc] += isInc ? val : -val;
            
            // 全域總計計算
            if(isInc) totalInc += val;
            else totalExp += val;

            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <div class="item-main">
                    <span class="item-tag">${getAcc(r.acc)} | ${r.date}</span>
                    <span class="item-name">${r.name}</span>
                </div>
                <div class="item-price ${isInc ? 'income' : 'expense'}">
                    ${isInc ? '+' : '-'}${val.toLocaleString()}
                </div>
                <div class="action-btns">
                    <button class="edit" onclick="editRecord(${r.id})">✎</button>
                    <button class="del" onclick="deleteRecord(${r.id})">✕</button>
                </div>
            `;
            list.appendChild(div);
        });

        // 更新銀行個別顯示
        for (let key in bals) {
            document.getElementById(`bal-${key}`).innerText = `$${bals[key].toLocaleString()}`;
        }

        // 更新全域加總顯示
        document.getElementById('grand-income').innerText = `$ ${totalInc.toLocaleString()}`;
        document.getElementById('grand-expense').innerText = `$ ${totalExp.toLocaleString()}`;
        document.getElementById('grand-balance').innerText = `$ ${(totalInc - totalExp).toLocaleString()}`;
    }

    function getAcc(key) {
        const m = { fubon: '富邦', next: '將來', feib: '遠東', cash: '現金' };
        return m[key];
    }
</script>

</body>
</html>
