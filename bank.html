<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinShop Ledger ⟡</title>
    <style>
        :root { --bg: #f7f7f5; --main: #b8c6db; --text: #5e5e5e; --accent: #d1a7a7; --income: #a7d1b8; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        
        .dashboard { background: #9fa9a3; color: white; padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 20px; }
        .dash-label { font-size: 0.7rem; opacity: 0.8; letter-spacing: 1px; }
        .dash-val { font-size: 1.8rem; font-weight: 200; margin-top: 5px; }

        .acc-row { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; scrollbar-width: none; padding-bottom: 5px; }
        .acc-row::-webkit-scrollbar { display: none; }
        .acc-card { min-width: 80px; background: #fbfbfb; padding: 10px; border-radius: 12px; border: 1px solid #f0f0f0; text-align: center; flex-shrink: 0; }
        .acc-name { font-size: 0.65rem; color: #999; display: block; margin-bottom: 4px; }
        .acc-bal { font-size: 0.75rem; color: #777; font-weight: bold; }

        .input-box { background: #fcfcfc; padding: 15px; border-radius: 18px; border: 1px solid #f0f0f0; margin-bottom: 20px; }
        
        /* 支出/收入切換鈕 */
        .type-toggle { display: flex; background: #eee; border-radius: 10px; margin-bottom: 15px; padding: 2px; }
        .type-toggle label { flex: 1; text-align: center; padding: 8px 0; font-size: 0.8rem; cursor: pointer; border-radius: 8px; margin: 0; transition: 0.3s; color: #aaa; }
        .type-toggle input { display: none; }
        .type-toggle input:checked + label { background: white; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.6rem; color: #bbb; margin-bottom: 4px; padding-left: 5px; }
        input, select { height: 38px; border: 1px solid #eee; border-radius: 8px; padding: 0 10px; font-size: 0.85rem; outline: none; background: white; color: var(--text); }
        
        .btn { width: 100%; height: 42px; background: var(--main); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; margin-top: 5px; }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #f9f9f9; }
        .price { font-weight: 500; font-size: 0.95rem; }
        .p-red { color: var(--accent); }
        .p-green { color: var(--income); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--main); color: white; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100; }
        .toast.show { opacity: 1; top: 30px; }
    </style>
</head>
<body>

<div id="toast" class="toast">同步中...</div>

<div class="container">
    <h2 style="text-align:center; font-weight:300; color:#ccc; letter-spacing:3px; font-size: 1rem; margin-bottom: 20px;">LINSHOP LEDGER ⟡</h2>

    <div class="dashboard">
        <div class="dash-label">THIS MONTH BALANCE</div>
        <div id="m-total" class="dash-val">$ 0</div>
    </div>

    <div class="acc-row">
        <div class="acc-card"><span class="acc-name">富邦</span><span class="acc-bal" id="b-富邦銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">將來</span><span class="acc-bal" id="b-將來銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">遠東</span><span class="acc-bal" id="b-遠東銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">現金</span><span class="acc-bal" id="b-手邊現金">$0</span></div>
    </div>

    <div class="input-box">
        <div class="type-toggle">
            <input type="radio" name="trType" id="typeExp" value="exp" checked>
            <label for="typeExp">支出</label>
            <input type="radio" name="trType" id="typeInc" value="inc">
            <label for="typeInc">收入</label>
        </div>

        <div class="field-grid">
            <div class="field"><label>日期</label><input type="date" id="date"></div>
            <div class="field"><label>帳戶</label>
                <select id="acc">
                    <option>富邦銀行</option><option>將來銀行</option><option>遠東銀行</option><option>手邊現金</option>
                </select>
            </div>
        </div>
        <div class="field-grid">
            <div class="field"><label>類別</label>
                <select id="cat">
                    <option>🍱 餐飲</option><option>📦 代購</option><option>🚗 交通</option><option>✨ 娛樂</option><option>💰 薪資</option><option>🛒 雜項</option>
                </select>
            </div>
            <div class="field"><label>金額</label><input type="number" id="amt" placeholder="$"></div>
        </div>
        <div class="field" style="margin-top: 10px;"><label>項目名稱</label><input type="text" id="name" placeholder="備註..."></div>
        <button class="btn" onclick="add()">新增帳目</button>
    </div>

    <div class="list-header">
        <input type="month" id="view-m" onchange="render()" style="border:none; background:transparent; color:#999; font-size: 0.9rem; outline: none;">
        <span onclick="sync()" style="font-size:0.7rem; color:var(--main); cursor:pointer; font-weight: bold;">☁️ 同步雲端</span>
    </div>

    <div id="list"></div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbzp0uI5lHJjZoevHdwDch_oKEtzilqOP82WO0C5JBvYjeUshGFE8f5A82AOR3w764RH/exec';
    let records = JSON.parse(localStorage.getItem('ls_v8')) || [];

    const today = new Date();
    document.getElementById('date').valueAsDate = today;
    document.getElementById('view-m').value = today.toISOString().slice(0, 7);

    function showMsg(text) { 
        const t = document.getElementById('toast'); 
        t.innerText = text; t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 3000); 
    }

    function sync() {
        showMsg("正在同步雲端...");
        const old = document.getElementById('jsonp-script');
        if (old) old.remove();
        const s = document.createElement('script');
        s.id = 'jsonp-script';
        s.src = `${API}?callback=handleResponse&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function handleResponse(data) {
        if (Array.isArray(data)) {
            records = data;
            localStorage.setItem('ls_v8', JSON.stringify(records));
            render();
            showMsg(`同步成功！共 ${data.length} 筆資料`);
        }
    }

    function render() {
        const list = document.getElementById('list');
        const viewMonth = document.getElementById('view-m').value;
        list.innerHTML = '';
        
        let mTotal = 0; // 當月收支總和
        let bals = {'富邦銀行':0, '將來銀行':0, '遠東銀行':0, '手邊現金':0};

        records.sort((a,b) => new Date(b.date) - new Date(a.date));

        records.forEach(r => {
            const val = parseFloat(r.amt) || 0;
            
            // 計算各帳戶餘額 (收入為正, 支出為負)
            if (bals.hasOwnProperty(r.acc)) {
                bals[r.acc] += val;
            }

            if (String(r.date).includes(viewMonth)) {
                mTotal += val;
                const isIncome = val >= 0;
                list.innerHTML += `
                    <div class="record-item">
                        <div style="flex:1">
                            <div style="font-size:0.85rem; margin-bottom:2px;">${r.name || '未命名'}</div>
                            <div style="font-size:0.6rem; color:#ccc;">${r.acc} · ${String(r.date).slice(5)}</div>
                        </div>
                        <div class="price ${isIncome ? 'p-green' : 'p-red'}">
                            ${isIncome ? '+' : ''}${val.toLocaleString()}
                        </div>
                    </div>`;
            }
        });

        document.getElementById('m-total').innerText = `$ ${mTotal.toLocaleString()}`;
        for (let key in bals) {
            const el = document.getElementById('b-' + key);
            if (el) el.innerText = `$${Math.round(bals[key]).toLocaleString()}`;
        }

        if (list.innerHTML === '') {
            list.innerHTML = `<div style="text-align:center; color:#eee; font-size:0.8rem; margin-top:30px;">本月尚無紀錄</div>`;
        }
    }

    function add() {
        const amtInput = document.getElementById('amt');
        const nameInput = document.getElementById('name');
        const isExp = document.getElementById('typeExp').checked;
        
        // 核心邏輯：如果是支出，金額自動轉為負數
        let finalAmt = parseFloat(amtInput.value);
        if (isExp) finalAmt = -Math.abs(finalAmt);
        else finalAmt = Math.abs(finalAmt);

        const r = {
            date: document.getElementById('date').value,
            acc: document.getElementById('acc').value,
            cat: document.getElementById('cat').value,
            name: nameInput.value || (isExp ? "一般支出" : "一般收入"),
            amt: finalAmt
        };

        if (!amtInput.value) return alert("請輸入金額！");

        records.push(r);
        render();

        fetch(API, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(r)
        }).then(() => {
            showMsg("已成功上傳雲端 ☁️");
            amtInput.value = '';
            nameInput.value = '';
        });
    }

    window.onload = sync;
</script>
</body>
</html>
