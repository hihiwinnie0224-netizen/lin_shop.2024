<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinShop Ledger ⟡</title>
    <style>
        :root { 
            --bg: #f8f9fb; 
            --main: #9cb1cc; 
            --sub: #b7a9c4;  
            --text: #4a4a4a; 
            --light-text: #b0b5c0;
            --accent: #d4a5a5; 
            --income: #9bbca9; 
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 12px;
            display: flex; justify-content: center; 
        }
        
        .container { 
            width: 100%; max-width: 480px; background: white; border-radius: 35px; 
            padding: 20px; box-shadow: 0 15px 40px rgba(156, 177, 204, 0.12); 
            position: relative; overflow: hidden; /* 防止內容溢出 */
        }

        h2 { text-align: center; font-weight: 300; color: var(--main); letter-spacing: 6px; font-size: 1.1rem; margin: 10px 0 20px; }

        .dashboard { 
            background: linear-gradient(135deg, var(--main), var(--sub)); 
            color: white; padding: 25px 15px; border-radius: 28px; text-align: center; margin-bottom: 20px; 
        }
        .dash-label { font-size: 0.7rem; opacity: 0.9; letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }
        .dash-val { font-size: 2rem; font-weight: 300; }

        /* 帳戶滑動區：確保不撐開容器 */
        .acc-row { 
            display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; 
            padding: 5px 2px; -webkit-overflow-scrolling: touch;
        }
        .acc-row::-webkit-scrollbar { display: none; }

        .acc-card { 
            min-width: 95px; flex: 0 0 auto; background: #ffffff; padding: 12px 8px; 
            border-radius: 18px; border: 1.5px solid #f1f3f6; text-align: center; 
        }
        .acc-name { font-size: 0.65rem; color: var(--light-text); display: block; margin-bottom: 4px; font-weight: bold; }
        .acc-bal { font-size: 0.8rem; color: var(--sub); font-weight: 800; }

        .input-box { background: #fcfdfe; padding: 18px; border-radius: 28px; border: 1.5px solid #f1f3f6; margin-bottom: 20px; }
        
        .type-toggle { display: flex; background: #ecedf2; border-radius: 12px; margin-bottom: 15px; padding: 4px; }
        .type-toggle label { flex: 1; text-align: center; padding: 10px 0; font-size: 0.85rem; cursor: pointer; border-radius: 10px; color: #a1a8b5; }
        .type-toggle input:checked + label { background: white; color: var(--main); font-weight: bold; }
        .type-toggle input { display: none; }

        /* 智能 Grid：螢幕太窄時自動換行 */
        .field-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; margin-bottom: 12px; 
        }
        .field { display: flex; flex-direction: column; min-width: 0; }
        label { font-size: 0.65rem; color: var(--light-text); margin-bottom: 5px; padding-left: 8px; font-weight: bold; }
        
        input, select { 
            height: 48px; border: 1.8px solid #eff1f5; border-radius: 12px; 
            padding: 0 12px; font-size: 0.95rem; width: 100%; outline: none;
            background: white; color: var(--text); -webkit-appearance: none;
        }

        .btn { 
            width: 100%; height: 52px; background: var(--main); color: white; 
            border: none; border-radius: 15px; cursor: pointer; font-size: 1rem; 
            margin-top: 5px; font-weight: bold; letter-spacing: 2px;
        }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .record-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5px; border-bottom: 1px solid #f9fafb; gap: 10px;
        }
        /* 避免備註文字太長把格子撐開 */
        .info-text { flex: 1; min-width: 0; }
        .rec-name { 
            font-size: 0.95rem; color: #444; font-weight: 500; margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .rec-sub { font-size: 0.75rem; color: var(--light-text); }
        
        .price { font-weight: 600; font-size: 1rem; white-space: nowrap; }
        .p-red { color: var(--accent); }
        .p-green { color: var(--income); }
        
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--sub); color: white; padding: 10px 25px; border-radius: 50px; font-size: 0.85rem; opacity: 0; transition: 0.4s; z-index: 100; pointer-events: none; }
        .toast.show { opacity: 1; bottom: 60px; }

        .sync-btn { font-size: 0.75rem; color: var(--main); cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold; background: #f0f3f7; padding: 8px 12px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="toast" class="toast">運作中...</div>

<div class="container">
    <h2>LINSHOP LEDGER ⟡</h2>

    <div class="dashboard">
        <div class="dash-label">⋆ TOTAL BALANCE ⋆</div>
        <div id="m-total" class="dash-val">$ 0</div>
    </div>

    <div class="acc-row">
        <div class="acc-card"><span class="acc-name">富邦</span><span class="acc-bal" id="b-富邦銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">將來</span><span class="acc-bal" id="b-將來銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">遠東</span><span class="acc-bal" id="b-遠東銀行">$0</span></div>
        <div class="acc-card"><span class="acc-name">現金</span><span class="acc-bal" id="b-手邊現金">$0</span></div>
    </div>

    <div class="input-box">
        <div class="type-toggle">
            <input type="radio" name="trType" id="typeExp" value="exp" checked>
            <label for="typeExp">支出 ☕</label>
            <input type="radio" name="trType" id="typeInc" value="inc">
            <label for="typeInc">收入 🎀</label>
        </div>

        <div class="field-grid">
            <div class="field"><label>日期</label><input type="date" id="date"></div>
            <div class="field"><label>帳戶</label>
                <select id="acc">
                    <option>富邦銀行</option><option>將來銀行</option><option>遠東銀行</option><option>手邊現金</option>
                </select>
            </div>
        </div>
        <div class="field-grid">
            <div class="field"><label>類別</label>
                <select id="cat">
                    <option>🍱 餐飲</option><option>📦 代購</option><option>🚗 交通</option><option>✨ 娛樂</option><option>💰 薪資</option><option>🛒 雜項</option>
                </select>
            </div>
            <div class="field"><label>金額</label><input type="number" id="amt" pattern="[0-9]*" inputmode="decimal" placeholder="$"></div>
        </div>
        <div class="field" style="margin-top: 8px;"><label>備註</label><input type="text" id="name" placeholder="想記點什麼呢... ✎"></div>
        <button class="btn" onclick="add()">新增紀錄 🐾</button>
    </div>

    <div class="list-header">
        <input type="month" id="view-m" onchange="render()" style="border:none; background:transparent; color:#b0b5c0; font-size: 0.9rem; font-weight: bold; outline:none;">
        <div class="sync-btn" onclick="sync()"><span>☁️</span> 同步</div>
    </div>

    <div id="list"></div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbzp0uI5lHJjZoevHdwDch_oKEtzilqOP82WO0C5JBvYjeUshGFE8f5A82AOR3w764RH/exec';
    let records = JSON.parse(localStorage.getItem('ls_v8')) || [];

    const today = new Date();
    document.getElementById('date').valueAsDate = today;
    document.getElementById('view-m').value = today.toISOString().slice(0, 7);

    function showMsg(text) { 
        const t = document.getElementById('toast'); 
        t.innerText = text; t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 3000); 
    }

    function sync() {
        showMsg("同步中...");
        const old = document.getElementById('jsonp-script');
        if (old) old.remove();
        const s = document.createElement('script');
        s.id = 'jsonp-script';
        s.src = `${API}?callback=handleResponse&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function handleResponse(data) {
        if (Array.isArray(data)) {
            records = data;
            localStorage.setItem('ls_v8', JSON.stringify(records));
            render();
            showMsg(`同步成功 ✧`);
        }
    }

    function render() {
        const list = document.getElementById('list');
        const viewMonth = document.getElementById('view-m').value;
        list.innerHTML = '';
        let mTotal = 0;
        let bals = {'富邦銀行':0, '將來銀行':0, '遠東銀行':0, '手邊現金':0};

        records.sort((a,b) => new Date(b.date) - new Date(a.date));

        records.forEach(r => {
            const val = parseFloat(r.amt) || 0;
            if (bals.hasOwnProperty(r.acc)) bals[r.acc] += val;
            if (String(r.date).includes(viewMonth)) {
                mTotal += val;
                const isInc = val >= 0;
                list.innerHTML += `
                    <div class="record-item">
                        <div class="info-text">
                            <div class="rec-name">${r.name}</div>
                            <div class="rec-sub">${r.acc} · ${String(r.date).slice(5)}</div>
                        </div>
                        <div class="price ${isInc ? 'p-green' : 'p-red'}">
                            ${isInc ? '+' : ''}${val.toLocaleString()}
                        </div>
                    </div>`;
            }
        });

        document.getElementById('m-total').innerText = `$ ${mTotal.toLocaleString()}`;
        for (let key in bals) {
            const el = document.getElementById('b-' + key);
            if (el) el.innerText = `$${Math.round(bals[key]).toLocaleString()}`;
        }
    }

    function add() {
        const amtInput = document.getElementById('amt');
        const nameInput = document.getElementById('name');
        const isExp = document.getElementById('typeExp').checked;
        if (!amtInput.value) return alert("要輸入金額唷！");
        let finalAmt = parseFloat(amtInput.value);
        finalAmt = isExp ? -Math.abs(finalAmt) : Math.abs(finalAmt);

        const r = {
            date: document.getElementById('date').value,
            acc: document.getElementById('acc').value,
            cat: document.getElementById('cat').value,
            name: nameInput.value || (isExp ? "支出" : "收入"),
            amt: finalAmt
        };
        records.push(r);
        render();
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) })
        .then(() => { showMsg("存入雲端 ✧"); amtInput.value = ''; nameInput.value = ''; });
    }
    window.onload = sync;
</script>
</body>
</html>
