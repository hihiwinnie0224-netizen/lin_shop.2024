<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | LINSHOP Select</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: #F9F8F6; color: #4A4A4A; }
        .nav-link { letter-spacing: 0.1em; transition: opacity 0.3s; }
        .nav-link:hover { opacity: 0.6; }
        .contact-container { max-width: 600px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        .id-badge { display: inline-block; background-color: #FFFFFF; border: 1px solid #E5E4E2; padding: 15px 40px; border-radius: 0; letter-spacing: 0.2em; font-size: 1.2rem; font-weight: 300; margin-top: 20px; }
        .instruction-step { font-size: 0.75rem; color: #8C8C8C; letter-spacing: 0.1em; margin-bottom: 40px; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-8 border-b border-gray-100 bg-white">
        <div class="text-2xl tracking-[0.3em] font-light">LINSHOP</div>
        <div class="hidden md:flex space-x-12 text-xs uppercase tracking-widest">
            <a href="index.html" class="nav-link text-gray-400">Home</a>
            <a href="service.html" class="nav-link text-gray-400">Service</a>
            <a href="contact.html" class="nav-link text-gray-800 border-b border-gray-400 pb-1">Contact</a>
        </div>
    </nav>

    <main class="contact-container">
        
        <header class="mb-20">
            <h2 class="text-xs tracking-[0.4em] text-gray-400 uppercase mb-4">Connect With Us</h2>
            <h1 class="text-2xl font-light tracking-[0.1em] text-gray-800">加入連線與群組</h1>
        </header>

        <section class="mb-24">
            <p class="text-sm tracking-widest leading-loose mb-6">
                所有訂單詢問、各國商品許願<br>以及批發小幫手應徵，請統一透過官方帳號聯繫。
            </p>
            <div class="instruction-step">LINE OFFICIAL ACCOUNT</div>
            <div class="id-badge">@532lxhxc</div>
        </section>

        <section class="border-t border-gray-200 pt-16">
            <h3 class="text-sm font-medium tracking-[0.2em] mb-8">私密連線群組加入方式</h3>
            <div class="text-xs text-gray-400 leading-relaxed space-y-4">
                <p>1. 搜尋並添加上述官方帳號</p>
                <p>2. 私訊告知您感興趣的項目 (零售 / 許願 / 批發)</p>
                <p>3. 管理員將於 24 小時內發送專屬邀請連結</p>
            </div>
        </section>

        <div class="mt-20">
            <a href="https://line.me/ti/p/@532lxhxc" class="text-[10px] tracking-[0.3em] border-b border-gray-400 pb-2 hover:text-gray-300 hover:border-gray-200 transition-all uppercase">
                Click to Add Line
            </a>
        </div>

    </main>

    <footer class="py-12 border-t border-gray-100 text-center bg-white mt-20">
        <p class="text-[10px] tracking-[0.3em] text-gray-300 uppercase">© LINSHOP Select. 2024</p>
    </footer>

</body>
</html>
