<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | LINSHOP Select</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif; 
            background-color: #FDFDFB; 
            color: #333333; 
            line-height: 1.8;
        }
        .nav-link { transition: all 0.3s; padding: 12px 16px; }
        
        /* 聯絡區塊圓潤化與陰影 */
        .contact-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        /* 強化 ID 顯示 */
        .id-display {
            background-color: #F8F9FA;
            border: 2px dashed #E5E5E5;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #1A1A1A;
            margin: 20px 0;
        }

        /* 步驟數字美化 */
        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #333;
            color: white;
            border-radius: 50%;
            font-size: 14px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 flex justify-between items-center px-6 md:px-12 py-5 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="text-2xl font-bold tracking-[0.2em]">LINSHOP</div>
        <div class="hidden md:flex items-center space-x-4 text-sm font-medium">
            <a href="index.html" class="nav-link text-gray-400 hover:text-gray-900">首頁</a>
            <a href="service.html" class="nav-link text-gray-400 hover:text-gray-900">服務項目</a>
            <a href="contact.html" class="nav-link text-gray-900 border-b-2 border-gray-900">聯絡我們</a>
        </div>
        <div class="md:hidden text-gray-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-16 md:py-24">
        
        <header class="text-center mb-16">
            <span class="text-xs tracking-[0.4em] text-gray-400 uppercase font-bold block mb-4">Connect With Us</span>
            <h1 class="text-3xl font-bold text-gray-900">加入連線與群組</h1>
        </header>

        <section class="contact-card p-8 md:p-12 text-center mb-12">
            <p class="text-lg text-gray-600 mb-8 leading-relaxed">
                所有訂單詢問、各國商品許願<br>
                請統一透過官方帳號聯繫。
            </p>
            
            <div class="text-xs font-bold tracking-widest text-green-600 mb-2">LINE OFFICIAL ACCOUNT</div>
            <div class="id-display">@532lxhxc</div>

            <div class="mt-10">
                <a href="https://line.me/ti/p/@532lxhxc" class="block w-full bg-[#06C755] text-white text-lg font-bold py-5 rounded-2xl hover:bg-[#05b34c] transition-all shadow-lg active:scale-[0.98]">
                    立即點擊加入 LINE
                </a>
            </div>
        </section>

        <section class="bg-gray-50 rounded-3xl p-8 md:p-10">
            <h3 class="text-lg font-bold mb-8 text-center border-b border-gray-200 pb-4">私密連線群組加入方式</h3>
            <div class="space-y-6 text-gray-700">
                <div class="flex items-start">
                    <span class="step-num">1</span>
                    <p class="font-medium">搜尋並添加上方官方帳號</p>
                </div>
                <div class="flex items-start">
                    <span class="step-num">2</span>
                    <p class="font-medium">私訊告知您感興趣的項目<br><span class="text-sm text-gray-400 font-normal">( 零售購物 / 商品許願 / 批發合作 )</span></p>
                </div>
                <div class="flex items-start">
                    <span class="step-num">3</span>
                    <p class="font-medium">管理員將於 24 小時內發送專屬邀請連結</p>
                </div>
            </div>
        </section>

    </main>

    <footer class="py-12 border-t border-gray-100 text-center bg-white mt-12">
        <p class="text-xs tracking-[0.3em] text-gray-300 uppercase">© LINSHOP Select. 2026</p>
    </footer>

</body>
</html>
