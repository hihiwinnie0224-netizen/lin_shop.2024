<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINSHOP ♡ 精選選物</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8fc;
            --card: #ffffff;
            --primary: #5a5a5a;
            --accent: #b09ac7;
            --accent-soft: #e8e1f4;
            --accent-deep: #8e75bb;
            --price: #9b7ecb;
            --border: #ede9f5;
            --green: #06C755;
            --white: #ffffff;
            --shadow: rgba(176,154,199,0.15);
            --tag-bg: #f3effe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', 'PingFang TC', sans-serif;
            background: var(--bg);
            color: var(--primary);
            min-height: 100vh;
            padding-bottom: 110px;
        }

        /* ─── HEADER ─── */
        .header {
            background: linear-gradient(135deg, #f0eafc 0%, #fdf6ff 60%, #eef5ff 100%);
            padding: 20px 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(176,154,199,0.10);
        }

        .header-title {
            text-align: center;
            margin-bottom: 14px;
        }

        .header-title .deco-top {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--accent);
            font-weight: 600;
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #5a4a7a;
            line-height: 1.2;
        }

        .header-title .deco-bottom {
            font-size: 12px;
            color: #b09ac7;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Search */
        .search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .search-wrap input {
            width: 100%;
            padding: 12px 44px 12px 18px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            background: var(--white);
            font-family: inherit;
            font-size: 14px;
            color: var(--primary);
            outline: none;
            transition: border-color .2s;
        }

        .search-wrap input:focus {
            border-color: var(--accent);
        }

        .search-wrap input::placeholder { color: #c0b4d6; }

        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 16px;
            pointer-events: none;
        }

        /* Toggle row */
        .toggle-row {
            display: flex;
            gap: 10px;
        }

        .pill-group {
            display: flex;
            background: var(--accent-soft);
            padding: 3px;
            border-radius: 50px;
            gap: 2px;
            flex: 1;
        }

        .pill-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 9px 4px;
            border-radius: 50px;
            cursor: pointer;
            color: #a08fc0;
            font-size: 13px;
            font-family: inherit;
            font-weight: 700;
            transition: all .2s;
            white-space: nowrap;
        }

        .pill-btn.active {
            background: var(--white);
            color: var(--accent-deep);
            box-shadow: 0 2px 8px rgba(142,117,187,0.18);
        }

        /* ─── PRODUCT GRID ─── */
        #product-list {
            padding: 14px 12px 0;
            display: grid;
            gap: 12px;
        }

        #product-list.grid { grid-template-columns: repeat(2, 1fr); }
        #product-list.list { grid-template-columns: 1fr; }

        /* ─── PRODUCT CARD ─── */
        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 18px var(--shadow);
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            border: 1px solid var(--border);
            position: relative;
            -webkit-user-select: none;
        }

        .product-card:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .img-wrap {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--accent-soft);
            overflow: hidden;
        }

        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .3s;
        }

        /* List mode image */
        #product-list.list .product-card {
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        #product-list.list .img-wrap {
            width: 90px;
            min-width: 90px;
            aspect-ratio: 1/1;
            border-radius: 0;
        }

        #product-list.list .card-body {
            flex: 1;
            padding: 14px 14px 14px 12px;
        }

        .card-body {
            padding: 10px 12px 12px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: #4a3a6a;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        #product-list.list .card-title {
            -webkit-line-clamp: 2;
            font-size: 14px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-tag {
            color: var(--price);
            font-weight: 800;
            font-size: 15px;
        }

        .multi-tag {
            background: var(--tag-bg);
            color: var(--accent-deep);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* ─── FAB BUTTONS ─── */
        .fab-group {
            position: fixed;
            right: 18px;
            bottom: 18px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            z-index: 500;
        }

        .fab {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            transition: transform .15s;
            font-family: inherit;
        }

        .fab:active { transform: scale(0.92); }

        .fab-line {
            background: var(--green);
            box-shadow: 0 4px 16px rgba(6,199,85,0.35);
        }

        .fab-cart {
            background: linear-gradient(135deg, #c4a8e8, #9b7ecb);
            box-shadow: 0 4px 16px rgba(155,126,203,0.4);
        }

        .fab-label {
            background: rgba(90,74,122,0.85);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            pointer-events: none;
        }

        .fab-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(60,40,90,0.45);
            z-index: 1000;
            justify-content: flex-end;
            align-items: flex-end;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.open {
            display: flex;
            animation: fadeIn .2s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-sheet {
            background: var(--white);
            border-radius: 28px 28px 0 0;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            padding: 0 0 30px;
            animation: slideUp .25s ease-out;
        }

        .modal-drag-bar {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 4px;
            margin: 12px auto 0;
        }

        .modal-img-wrap {
            width: 100%;
            aspect-ratio: 4/3;
            background: var(--accent-soft);
            overflow: hidden;
            margin-bottom: 0;
        }

        .modal-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Image gallery dots */
        .img-gallery {
            position: relative;
        }

        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 8px 0 0;
        }

        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: background .2s;
        }

        .gallery-dot.active { background: var(--accent); width: 16px; border-radius: 3px; }

        .modal-body {
            padding: 16px 20px 0;
        }

        .modal-deco {
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 800;
            color: #3a2a5a;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .modal-price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
        }

        .modal-price {
            font-size: 26px;
            font-weight: 800;
            color: var(--price);
        }

        .modal-price-label {
            font-size: 12px;
            color: #aaa;
            font-weight: 600;
        }

        .modal-desc {
            font-size: 13px;
            line-height: 1.8;
            color: #6a5a8a;
            background: var(--tag-bg);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            white-space: pre-wrap;
        }

        /* Specs */
        .specs-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .specs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .spec-chip {
            background: var(--tag-bg);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 700;
            color: #5a4a7a;
            cursor: pointer;
            transition: all .15s;
        }

        .spec-chip.selected {
            background: var(--accent-deep);
            border-color: var(--accent-deep);
            color: white;
        }

        /* Countdown */
        .countdown-wrap {
            background: linear-gradient(135deg, #f9f5ff, #fff0f8);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .countdown-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .countdown-timer {
            font-size: 13px;
            font-weight: 800;
            color: #c05080;
            font-variant-numeric: tabular-nums;
        }

        /* Action buttons */
        .modal-actions {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            margin-top: 4px;
        }

        .btn-line {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: var(--green);
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .15s, opacity .15s;
            letter-spacing: 0.5px;
        }

        .btn-line:active { transform: scale(0.97); opacity: 0.9; }

        .btn-close {
            width: 50px;
            height: 50px;
            border: 1.5px solid var(--border);
            border-radius: 50%;
            background: var(--white);
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: inherit;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #c0b4d6;
            font-size: 14px;
            font-weight: 700;
        }

        .empty-state .big { font-size: 36px; margin-bottom: 8px; }

        /* ─── SCROLLBAR ─── */
        .modal-sheet::-webkit-scrollbar { width: 4px; }
        .modal-sheet::-webkit-scrollbar-track { background: transparent; }
        .modal-sheet::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Cart count badge */
        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff6b8a;
            color: white;
            font-size: 10px;
            font-weight: 800;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
        }

        .fab-cart-wrap { position: relative; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(90,74,122,0.92);
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
            z-index: 2000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

    { id:76, title:"Disney 授權 Stitch 醜丫頭吊飾 (含限定櫻花款)", img:"https://img3.shop2000.com.tw/105667/p214/59349321-1o.jpg", retail:280, wholesale:215, endTime:"2026/03/30 23:59:00", desc:"醜丫頭控尖叫！迪士尼正版授權吊飾！\n推出夢幻櫻花粉色限定款，氣質溫柔細緻。\n＊ 尺寸：約 10cm\n＊ 材質：100% 聚酯纖維填充" }
];

let currentRole = 'wholesale';
let currentView = 'grid';
let currentProduct = null;
let currentImgIdx = 0;
let countdownInterval = null;

// ── VIEW / ROLE ──
function changeView(type) {
    currentView = type;
    document.getElementById('product-list').className = type;
    document.getElementById('btn-grid').classList.toggle('active', type === 'grid');
    document.getElementById('btn-list').classList.toggle('active', type === 'list');
}

function changeRole(role) {
    currentRole = role;
    document.getElementById('btn-wholesale').classList.toggle('active', role === 'wholesale');
    document.getElementById('btn-retail').classList.toggle('active', role === 'retail');
    updateView();
}

function getPrice(p) {
    return currentRole === 'wholesale' ? p.wholesale : p.retail;
}

// ── RENDER CARDS ──
function updateView() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const list = document.getElementById('product-list');
    list.innerHTML = '';

    const filtered = products.filter(p => p.title.toLowerCase().includes(query) || (p.desc||'').toLowerCase().includes(query));

    if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="big">(´• ω •`)</div>找不到相關商品呢~</div>';
        return;
    }

    filtered.forEach(p => {
        const price = getPrice(p);
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => openModal(p);
        card.innerHTML = `
            <div class="img-wrap"><img src="${p.img}" alt="${p.title}" loading="lazy"></div>
            <div class="card-body">
                <div class="card-title">${p.title}</div>
                <div class="price-row">
                    <span class="price-tag">$ ${price.toLocaleString()}</span>
                    ${p.isMulti ? '<span class="multi-tag">多規格</span>' : ''}
                </div>
            </div>`;
        list.appendChild(card);
    });
}

// ── MODAL ──
function openModal(p) {
    currentProduct = p;
    currentImgIdx = 0;

    // Images
    const images = p.images || [p.img];
    document.getElementById('modal-img').src = images[0];

    // Dots
    const dotsEl = document.getElementById('gallery-dots');
    if (images.length > 1) {
        dotsEl.innerHTML = images.map((_, i) =>
            `<div class="gallery-dot ${i===0?'active':''}" onclick="switchImg(${i})"></div>`
        ).join('');
        dotsEl.style.display = 'flex';
    } else {
        dotsEl.innerHTML = '';
        dotsEl.style.display = 'none';
    }

    // Touch swipe on image
    setupSwipe(images);

    // Title & price
    document.getElementById('modal-title').textContent = p.title;

    const roleLabel = currentRole === 'wholesale' ? '( 批發價 )' : '( 零售價 )';
    document.getElementById('modal-price').textContent = '$ ' + getPrice(p).toLocaleString();
    document.getElementById('modal-price-label').textContent = roleLabel;

    // Desc
    document.getElementById('modal-desc').textContent = p.desc || '';

    // Specs
    const specsSection = document.getElementById('specs-section');
    const specsGrid = document.getElementById('specs-grid');
    if (p.isMulti && p.specs) {
        specsSection.style.display = 'block';
        specsGrid.innerHTML = p.specs.map((s, i) => {
            const price = currentRole === 'wholesale' ? s.w : s.r;
            return `<div class="spec-chip" onclick="selectSpec(this, ${i})">${s.name}<br><small style="color:inherit;opacity:0.75">$ ${price}</small></div>`;
        }).join('');
    } else {
        specsSection.style.display = 'none';
    }

    // Countdown
    startCountdown(p.endTime);

    // LINE link with product name
    const lineUrl = `https://line.me/ti/p/@532lxhxc`;
    document.getElementById('btn-line-modal').href = lineUrl;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function selectSpec(el, idx) {
    document.querySelectorAll('.spec-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');

    // Update price based on spec
    const p = currentProduct;
    if (p.specs && p.specs[idx]) {
        const s = p.specs[idx];
        const price = currentRole === 'wholesale' ? s.w : s.r;
        document.getElementById('modal-price').textContent = '$ ' + price.toLocaleString();
    }
}

function switchImg(idx) {
    const images = currentProduct.images || [currentProduct.img];
    currentImgIdx = idx;
    document.getElementById('modal-img').src = images[idx];
    document.querySelectorAll('.gallery-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
    });
}

let touchStartX = 0;
function setupSwipe(images) {
    const imgEl = document.getElementById('modal-img');
    imgEl.ontouchstart = (e) => { touchStartX = e.touches[0].clientX; };
    imgEl.ontouchend = (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 40) {
            if (dx < 0 && currentImgIdx < images.length - 1) switchImg(currentImgIdx + 1);
            else if (dx > 0 && currentImgIdx > 0) switchImg(currentImgIdx - 1);
        }
    };
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
}

// ── COUNTDOWN ──
function startCountdown(endTimeStr) {
    if (countdownInterval) clearInterval(countdownInterval);
    const wrap = document.getElementById('countdown-wrap');
    const timerEl = document.getElementById('countdown-timer');

    function update() {
        const end = new Date(endTimeStr);
        const now = new Date();
        const diff = end - now;

        if (diff <= 0) {
            timerEl.textContent = '已截止';
            timerEl.style.color = '#aaa';
            clearInterval(countdownInterval);
            return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        if (d > 30) {
            timerEl.textContent = `還有 ${d} 天`;
            timerEl.style.color = '#9b7ecb';
        } else if (d > 0) {
            timerEl.textContent = `${d} 天 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            timerEl.style.color = d <= 2 ? '#c05080' : '#9b7ecb';
        } else {
            timerEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            timerEl.style.color = '#c05080';
        }
    }

    wrap.style.display = 'flex';
    update();
    countdownInterval = setInterval(update, 1000);
}

// ── TOAST ──
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
updateView();
</script>
