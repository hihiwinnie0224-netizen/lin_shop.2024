            --accent-light: #b5a4c9; /* 淺紫 */

            --border-color: #e2e2e2;
            --white: #ffffff;
        }

        body {

            color: var(--primary-text);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        .header {
            max-width: 1200px;
            margin: 20px auto;
            text-align: center;
        }

        .header h1 {
            font-weight: 300;
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #4a4a4a;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar-row {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        input[type="text"] {
            padding: 8px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            flex: 1;
            max-width: 200px;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.9);
        }

        .view-toggle, .role-switch {
            display: flex;
            background: #e8e7ed;
            padding: 3px;
            border-radius: 20px;
            gap: 2px;
        }

        .view-btn, .role-switch label {
            border: none;
            background: transparent;
            padding: 6px 12px;
            border-radius: 18px;
            cursor: pointer;
            color: #8e8e8e;
            font-size: 12px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .view-btn.active, .role-switch input[name="role"]:checked + span {
            background: var(--white);
            color: var(--accent-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            padding: 6px 12px;
            border-radius: 18px;
        }

        .role-switch input[name="role"]:checked + span {
            background: var(--accent-color);
            color: white;
        }

        input[name="role"] { display: none; }

        #product-list {
            display: grid;
            gap: 15px;
            max-width: 1200px;
            margin: 30px auto;
        }

        #product-list.grid {
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        }

        #product-list.list {
            grid-template-columns: 1fr;
            max-width: 600px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.3s;
        }

        #product-list.list .product-card {
            flex-direction: row;
            height: 110px;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #f0f0f0;
        }

        #product-list.list .img-container {
            width: 110px;
            height: 110px;
        }

        .img-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .card-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }

        .card-title {
            font-size: 13px;
            color: #444;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-tag {
            color: var(--price-color);
            font-weight: 600;
            font-size: 15px;
        }

        .countdown-timer {
            font-size: 10px;
            color: #bbb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--white);
            width: 85%;
            max-width: 400px;
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }

        .btn {
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-primary { background: var(--accent-color); color: white; }
        .btn-outline { background: #f0f0f0; color: #888; }

        .cart-fab {
            position: fixed;
            bottom: 25px; right: 25px;
            background: var(--accent-color);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(157, 138, 177, 0.4);
            z-index: 999;
            cursor: pointer;
        }

            #product-list.grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header h1 { font-size: 1.2rem; }
            input[type="text"] { width: 120px; }
        }
        /* --- 原單標籤樣式 --- */
.img-container {
    position: relative; /* 必加，讓標籤準確定位在圖片上 */

    content: "原單精品";
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--accent-color);
    color: white;
    font-size: 10px;

    z-index: 5;

}

<div class="header">
    <h1>LINSHOP ✧ 精選選物</h1>
    <div class="controls">
        <div class="search-bar-row">
            <input type="text" id="product-search" placeholder="搜尋商品..." oninput="updateView()">
            <div class="view-toggle">
                <button class="view-btn active" onclick="changeView('grid')">方格</button>
                <button class="view-btn" onclick="changeView('list')">橫條</button>
            </div>
        </div>
        
        <div class="role-switch">
            <label><input type="radio" name="role" value="wholesale" checked onclick="updateView()"><span>批發端</span></label>
            <label><input type="radio" name="role" value="retail" onclick="updateView()"><span>零售端</span></label>
        </div>
    </div>
</div>

<div id="product-list" class="grid"></div>

<div id="detail-modal" class="modal">
    <div class="modal-content">

        <div id="spec-area"></div>
        <p id="modal-desc" style="white-space: pre-line; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 15px; margin-top: 10px;"></p>
        <button class="btn btn-primary" id="modal-confirm-add">加入清單</button>
        <button class="btn btn-outline" onclick="closeModal()">返回列表</button>
    </div>
</div>

<div id="cart-modal" class="modal">

        <div id="cart-total" style="text-align: right; font-weight: 600; font-size: 16px; margin: 15px 0;"></div>
        <button class="btn btn-primary" onclick="copyCartText()">複製文字報單</button>
        <button class="btn btn-outline" onclick="toggleCart()">關閉</button>
    </div>
</div>

<div class="cart-fab" onclick="toggleCart()">

let cart = [];
    let timers = {};
    let currentLayout = 'grid';

    function changeView(type) {
        currentLayout = type;
        const list = document.getElementById('product-list');
        const btns = document.querySelectorAll('.view-btn');
        list.className = type;
        btns.forEach(btn => btn.classList.toggle('active', btn.innerText.includes(type === 'grid' ? '方格' : '橫條')));
        updateView();
    }

    function updateView() {
        const searchTerm = document.getElementById('product-search').value.toLowerCase();
        const roleEl = document.querySelector('input[name="role"]:checked');
        const currentRole = roleEl ? roleEl.value : 'wholesale';
        
        const list = document.getElementById('product-list');
        if (!list) return; // 安全檢查
        list.innerHTML = '';

        // 【核心修正】先複製一份陣列再排序，確保不會更動到原資料且能正確執行
        const displayData = [...products]
            .filter(p => p.title.toLowerCase().includes(searchTerm))
            .sort((a, b) => b.id - a.id); // 大 ID 在前

        displayData.forEach(p => {
            const price = currentRole === 'wholesale' ? p.wholesale : p.retail;
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openDetail(p.id);

            const tagClass = p.isOriginal ? 'original-tag' : '';
            const originalIcon = p.isOriginal ? '<span style="color:var(--accent-color);">✦</span> ' : '';

            card.innerHTML = `
                <div class="img-container ${tagClass}"> <img src="${p.img}" loading="lazy">
                </div>
                <div class="card-content">
                    <div>
                        <div class="card-title">${originalIcon}${p.title}</div> 
                        <div class="price-tag">$${price}</div>
                    </div>
                    <div class="countdown-timer" id="timer-${p.id}">計算中...</div>
                </div>
            `;
            list.appendChild(card);
            startTimer(p.id, p.endTime);
        });
    }

    // --- 以下為其他必要函式，請務必保留 ---

    function openDetail(id) {
        const p = products.find(item => item.id === id);
        if (!p) return;
        const role = document.querySelector('input[name="role"]:checked').value;
        const imgArea = document.getElementById('modal-img-area');
        if (p.images && p.images.length > 0) {
            imgArea.innerHTML = `<div class="image-scroller" style="display:flex; overflow-x:auto; gap:10px; scroll-snap-type:x mandatory;">
                ${p.images.map(src => `<img src="${src}" style="width:100%; flex-shrink:0; scroll-snap-align:start; border-radius:15px; aspect-ratio:1/1; object-fit:cover;">`).join('')}
            </div>`;
        } else {
            imgArea.innerHTML = `<img src="${p.img}" style="width:100%; border-radius:15px; aspect-ratio:1/1; object-fit:cover;">`;
        }
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-price').innerText = `$${role === 'wholesale' ? p.wholesale : p.retail}`;
        document.getElementById('modal-desc').innerText = p.desc || "尚無產品描述";
        const specArea = document.getElementById('spec-area');
        specArea.innerHTML = '';
        if (p.isMulti && p.specs) {
            const select = document.createElement('select');
            select.id = 'active-spec';
            select.style = "width:100%; padding:12px; margin:20px 0; border-radius:12px; border:1px solid #eee;";
            p.specs.forEach(s => {
                const sPrice = role === 'wholesale' ? s.w : s.r;
                const option = document.createElement('option');
                option.value = s.name;
                option.text = `${s.name} - $${sPrice}`;
                option.dataset.price = sPrice;
                select.appendChild(option);
            });
            specArea.appendChild(select);
        }
        document.getElementById('modal-confirm-add').onclick = () => addToCart(p);
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

    function addToCart(p) {
        const role = document.querySelector('input[name="role"]:checked').value;
        let finalTitle = p.title;
        let finalPrice = role === 'wholesale' ? p.wholesale : p.retail;
        if (p.isMulti) {
            const specEl = document.getElementById('active-spec');
            const selectedOption = specEl.options[specEl.selectedIndex];
            finalTitle += ` (${selectedOption.value})`;
            finalPrice = parseInt(selectedOption.dataset.price);
        }
        cart.push({ title: finalTitle, price: finalPrice });
        updateCartUI();
        closeModal();
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        const container = document.getElementById('cart-items-container');
        const totalEl = document.getElementById('cart-total');
        container.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            const div = document.createElement('div');
            div.style = "display:flex; justify-content:space-between; align-items:center; font-size:14px; margin-bottom:12px; padding:12px; background:#f8f8f8; border-radius:12px;";
            div.innerHTML = `<span style="flex:1;">${item.title}</span><span style="color:var(--price-color); font-weight:600; margin:0 10px;">$${item.price}</span><span onclick="removeFromCart(${index})" style="cursor:pointer; color:#ccc;">✕</span>`;
            container.appendChild(div);
        });
        totalEl.innerText = `總計金額：$${total}`;
    }

    function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }
    function toggleCart() {
        const m = document.getElementById('cart-modal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function startTimer(id, endStr) {
        if (timers[id]) clearInterval(timers[id]);
        const el = document.getElementById(`timer-${id}`);
        if (!el) return;
        const endTime = new Date(endStr).getTime();
        const refresh = () => {
            const now = new Date().getTime();
            const d = endTime - now;
            if (d < 0) { el.innerText = "活動結束"; clearInterval(timers[id]); return; }
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            el.innerText = `倒數 ${days}天 ${hours}時`;
        };
        refresh();
        timers[id] = setInterval(refresh, 60000);
    }

    function copyCartText() {
        if (cart.length === 0) return alert("清單是空的唷！");
        let text = "🛒 LINSHOP 我的選購清單：\n--------------------------\n";
        let total = 0;
        cart.forEach((item, i) => {
            text += `${i + 1}. ${item.title} $${item.price}\n`;
            total += item.price;
        });
        text += `--------------------------\n總計項目：${cart.length} 件\n應付金額：$${total}\n\n✨ 截圖或複製私訊客服即可！`;
        navigator.clipboard.writeText(text).then(() => alert("✨ 清單已複製！"));
    }

    window.onclick = function(event) {
        if (event.target.className === 'modal') event.target.style.display = 'none';
    };

    document.addEventListener('DOMContentLoaded', updateView);
</script>

</body>
</html>
