<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINSHOP | Global Select</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif; 
            background-color: #FDFDFB; /* 更清爽的米白色 */
            color: #333333; 
            line-height: 1.8;
        }
        .nav-link { 
            transition: all 0.3s; 
            padding: 12px 16px; /* 增加點擊區域 */
        }
        /* 手機端點擊回饋 */
        .btn-primary:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 flex justify-between items-center px-6 md:px-12 py-5 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="text-2xl font-bold tracking-[0.2em] text-gray-800">LINSHOP</div>
        
        <div class="hidden md:flex items-center space-x-4 text-sm font-medium">
            <a href="index.html" class="nav-link text-gray-900 border-b-2 border-gray-900">首頁</a>
            <a href="service.html" class="nav-link text-gray-400 hover:text-gray-900">服務項目</a>
            <a href="contact.html" class="nav-link text-gray-400 hover:text-gray-900">聯絡我們</a>
        </div>

        <div class="md:hidden text-gray-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </div>
    </nav>

    <header class="min-h-[60vh] flex items-center justify-center px-6 py-20 text-center">
        <div>
            <span class="block text-xs md:text-sm tracking-[0.3em] text-gray-400 mb-4 uppercase font-medium">Global Select Shop</span>
            <h1 class="text-3xl md:text-5xl font-bold mb-8 tracking-normal leading-[1.4] text-gray-900">
                跨越國界的選物美學<br>
                <span class="text-gray-500 font-medium">從日韓到全球的即時連線</span>
            </h1>
            <div class="mt-12">
                <a href="contact.html" class="btn-primary inline-block bg-gray-900 text-white px-12 py-4 rounded-full text-sm tracking-widest hover:bg-gray-700 transition-all shadow-sm">
                    探索更多商品
                </a>
            </div>
        </div>
    </header>

    <section class="py-20 px-6 max-w-5xl mx-auto">
        <div class="text-center mb-16">
            <p class="text-lg md:text-xl leading-relaxed text-gray-600">
                我們致力於尋找世界各地具有質感的物件。<br class="hidden md:block">
                不只是買賣，更是一種對生活的挑選。
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="group">
                <div class="aspect-[4/5] bg-gray-100 rounded-2xl overflow-hidden mb-4 flex items-center justify-center italic text-gray-400 group-hover:opacity-90 transition-all">
                    Japan Selection
                </div>
                <h3 class="text-lg font-bold text-center">日系極簡系列</h3>
            </div>
            <div class="group">
                <div class="aspect-[4/5] bg-gray-100 rounded-2xl overflow-hidden mb-4 flex items-center justify-center italic text-gray-400 group-hover:opacity-90 transition-all">
                    Korea Selection
                </div>
                <h3 class="text-lg font-bold text-center">韓系質感連線</h3>
            </div>
        </div>
    </section>

    <footer class="py-16 border-t border-gray-100 text-center bg-white">
        <div class="flex justify-center space-x-6 mb-6 text-sm text-gray-500">
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
            <a href="#">Line</a>
        </div>
        <p class="text-xs tracking-widest text-gray-300 uppercase">© LINSHOP SELECT. 2026</p>
    </footer>

</body>
</html>
