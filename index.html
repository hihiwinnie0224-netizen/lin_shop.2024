<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINSHOP | Global Select</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif; 
            background-color: #FDFDFB; 
            color: #333333; 
        }
        .product-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 flex justify-between items-center px-6 md:px-12 py-5 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="text-2xl font-bold tracking-[0.2em] text-gray-800">LINSHOP</div>
        <div class="hidden md:flex items-center space-x-6 text-sm font-medium">
            <a href="#" class="text-gray-900 border-b-2 border-gray-900">首頁</a>
            <a href="#products" class="text-gray-400 hover:text-gray-900 transition">所有商品</a>
            <a href="#" class="text-gray-400 hover:text-gray-900 transition">聯絡我們</a>
        </div>
        <div class="md:hidden text-gray-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </div>
    </nav>

    <header class="min-h-[50vh] flex items-center justify-center px-6 py-12 text-center">
        <div>
            <span class="block text-xs md:text-sm tracking-[0.3em] text-gray-400 mb-4 uppercase font-medium">Global Select Shop</span>
            <h1 class="text-3xl md:text-5xl font-bold mb-6 text-gray-900 leading-tight">
                跨越國界的選物美學<br>
                <span class="text-gray-400 font-medium text-2xl md:text-4xl">從日韓到全球的即時連線</span>
            </h1>
            <a href="#products" class="inline-block bg-gray-900 text-white px-10 py-3 rounded-full text-sm tracking-widest hover:bg-gray-700 transition-all active:scale-95 shadow-lg">
                瀏覽商品頁面
            </a>
        </div>
    </header>

    <section id="products" class="py-16 px-6 max-w-7xl mx-auto">
        <h2 class="text-2xl font-bold mb-10 text-center tracking-widest text-gray-800">NEW ARRIVALS</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-10">
            
            <div class="product-card group cursor-pointer">
                <div class="relative aspect-[3/4] bg-gray-100 rounded-xl overflow-hidden mb-4">
                    <div class="absolute inset-0 flex items-center justify-center text-gray-300 italic">Product Image</div>
                    </div>
                <h3 class="text-sm font-medium text-gray-800 mb-1">日系質感手提袋</h3>
                <p class="text-sm text-gray-500 mb-3">NT$ 1,280</p>
                <a href="你的好賣家自填單連結" target="_blank" class="block text-center border border-gray-900 text-gray-900 py-2 rounded-lg text-xs hover:bg-gray-900 hover:text-white transition active:scale-95">
                    立即下單
                </a>
            </div>

            <div class="product-card group cursor-pointer">
                <div class="relative aspect-[3/4] bg-gray-100 rounded-xl overflow-hidden mb-4">
                    <div class="absolute inset-0 flex items-center justify-center text-gray-300 italic">Product Image</div>
                </div>
                <h3 class="text-sm font-medium text-gray-800 mb-1">韓系簡約針織衫</h3>
                <p class="text-sm text-gray-500 mb-3">NT$ 980</p>
                <a href="你的好賣家自填單連結" target="_blank" class="block text-center border border-gray-900 text-gray-900 py-2 rounded-lg text-xs hover:bg-gray-900 hover:text-white transition active:scale-95">
                    立即下單
                </a>
            </div>

            </div>
    </section>

    <footer class="py-16 border-t border-gray-100 text-center bg-white mt-10">
        <div class="flex justify-center space-x-8 mb-6 text-sm font-medium text-gray-600">
            <a href="#" class="hover:text-black">Instagram</a>
            <a href="#" class="hover:text-black">Line 客服</a>
        </div>
        <p class="text-[10px] tracking-widest text-gray-400 uppercase">© 2026 LINSHOP SELECT. All Rights Reserved.</p>
    </footer>

</body>
</html>
