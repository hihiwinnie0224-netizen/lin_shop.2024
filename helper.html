<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𐙚 LINSHOP 智慧定價助手</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4eff6;
  --card:#fff;
  --border:#e2daea;
  --accent:#9a85b4;
  --accent-dark:#7a5fa0;
  --text:#3a3040;
  --text2:#6b5b7a;
  --text3:#a896b8;
  --input-bg:#faf9fb;
  --tag-bg:#f0eaf5;
  --tag-color:#7a5a96;
  --shopee:#ee4d2d;
  --google:#4285f4;
  --green:#2a9d5c;
  --green-bg:#edf7f2;
  --green-border:#b6dfc8;
  --warn:#e07b00;
  --warn-bg:#fff8ee;
  --warn-border:#f5cf8a;
  --info-bg:#eef4ff;
  --info-border:#b5d0f5;
  --info-color:#2563eb;
}
body{font-family:'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 40px}

/* HEADER */
.header{text-align:center;padding:20px 0 14px}
.header h1{font-size:20px;font-weight:700;color:var(--accent-dark);letter-spacing:0.06em}
.header p{font-size:12px;color:var(--text3);margin-top:5px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(122,104,138,0.06)}
.card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title span{background:var(--accent);color:#fff;font-size:11px;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* INPUTS */
label{font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:5px}
textarea,input[type=text],input[type=number]{
  width:100%;font-family:inherit;font-size:14px;
  padding:10px 12px;border:1px solid var(--border);
  border-radius:8px;background:var(--input-bg);color:var(--text);
  outline:none;transition:border 0.15s;
  -webkit-appearance:none;appearance:none
}
textarea:focus,input:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.6}

/* GRID */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:400px){.row2{grid-template-columns:1fr}.row3{grid-template-columns:1fr 1fr}}

/* HINT */
.hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
.hint.warn{color:var(--warn)}
.hint.ok{color:var(--green)}

/* DETECTED TAGS */
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;min-height:24px}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--tag-bg);color:var(--tag-color);border:1px solid #d8cce6;white-space:nowrap}
.tag.blue{background:var(--info-bg);color:var(--info-color);border-color:var(--info-border)}
.tag.green{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}

/* SEARCH BTNS */
.search-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.search-btn{font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;cursor:pointer;border:none;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.search-btn:active{opacity:0.75;transform:scale(0.98)}
.search-btn.shopee{background:var(--shopee);color:#fff}
.search-btn.google{background:var(--google);color:#fff}

/* PRICE PREVIEW CARDS */
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.price-card{border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.price-card.ws{background:#f5f2f8;border-color:#d8cce6}
.price-card.rt{background:var(--info-bg);border-color:var(--info-border)}
.price-card.suggest{background:var(--green-bg);border-color:var(--green-border)}
.pc-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px}
.price-card.rt .pc-label{color:#5b8dd9}
.price-card.suggest .pc-label{color:var(--green)}
.pc-val{font-size:22px;font-weight:700;color:var(--text)}
.price-card.rt .pc-val{color:var(--info-color)}
.price-card.suggest .pc-val{color:var(--green)}
.pc-sub{font-size:11px;color:var(--text3);margin-top:2px}
.price-card.suggest .pc-sub{color:var(--green);opacity:0.8}

/* MARKET STATUS */
.mkt-status{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:8px;line-height:1.6}
.mkt-status.good{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.mkt-status.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.mkt-status.info{background:var(--info-bg);color:var(--info-color);border:1px solid var(--info-border)}

/* GENERATE BTN */
.generate-btn{
  width:100%;padding:14px;font-size:15px;font-weight:700;
  border-radius:10px;cursor:pointer;border:none;
  background:var(--accent);color:#fff;
  letter-spacing:0.05em;margin-top:6px;
  transition:background 0.2s,transform 0.1s;
  box-shadow:0 4px 14px rgba(154,133,180,0.3)
}
.generate-btn:hover{background:var(--accent-dark)}
.generate-btn:active{transform:scale(0.98)}

/* OUTPUT */
.output-section{margin-top:6px}
.output-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:8px}
.output-box{
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:10px;padding:14px;
  font-size:13px;line-height:2;
  white-space:pre-wrap;word-break:break-word;color:var(--text);
  max-height:560px;overflow-y:auto;
  font-family:'PingFang TC','Microsoft JhengHei',sans-serif
}
.copy-btn{
  width:100%;padding:11px;font-size:13px;font-weight:600;
  border-radius:8px;cursor:pointer;
  border:1px solid #c8bedc;background:#f0eaf5;color:var(--text2);
  margin-top:8px;transition:background 0.15s;
}
.copy-btn:hover{background:#e4daf0}
.copy-btn:active{transform:scale(0.98)}

/* SECTION SEP */
.sep{border-top:1px solid var(--border);margin:12px 0;padding-top:12px}
.mini-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}

/* WEIGHT ESTIMATE BADGE */
.weight-est{display:inline-flex;align-items:center;gap:4px;background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border);font-size:11px;padding:3px 8px;border-radius:6px;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <h1>𐙚 LINSHOP 智慧定價助手</h1>
  <p>自動多分類識別 · 市場行情參考定價 · 自動估重 · 手機電腦通用</p>
</div>

<!-- 1. 商品輸入 -->
<div class="card">
  <div class="card-title"><span>1</span>商品名稱 + 描述（一起輸入）</div>
  <textarea id="prodInput" rows="3" placeholder="例如：日本代購 吉伊卡哇盲盒 正版正貨 附保證書 另有穿戴甲現貨" oninput="onInput()"></textarea>
  <div class="tag-row" id="detectedCatTags"><span style="font-size:11px;color:var(--text3)">輸入後自動顯示偵測到的分類</span></div>
  <div class="search-row">
    <button class="search-btn shopee" onclick="searchShopee()">🧡 蝦皮查行情</button>
    <button class="search-btn google" onclick="searchGoogle()">💙 Google 比價</button>
  </div>
</div>

<!-- 2. 市場行情 -->
<div class="card">
  <div class="card-title"><span>2</span>市場行情（查完蝦皮後填入）</div>
  <div class="row2">
    <div>
      <div class="mini-label">市場最低價 NT$</div>
      <input type="number" id="mktLow" placeholder="例：99" min="0" oninput="calcAll()">
    </div>
    <div>
      <div class="mini-label">市場最高價 NT$</div>
      <input type="number" id="mktHigh" placeholder="例：299" min="0" oninput="calcAll()">
    </div>
  </div>
  <div id="mktStatus"></div>
</div>

<!-- 3. 成本 + 重量 -->
<div class="card">
  <div class="card-title"><span>3</span>成本與重量</div>
  <div class="row2">
    <div>
      <div class="mini-label">商品裸成本 NT$</div>
      <input type="number" id="prodCost" placeholder="進貨成本" min="0" oninput="calcAll()">
    </div>
    <div>
      <div class="mini-label">重量 kg <span id="weightEstBadge" style="display:none;font-size:10px;background:#fff8ee;color:#e07b00;border:1px solid #f5cf8a;border-radius:4px;padding:1px 5px;margin-left:3px">自動估算</span></div>
      <input type="number" id="prodWeight" placeholder="自動估算" min="0" step="0.01" oninput="onWeightManual()">
    </div>
  </div>
  <div class="hint" id="weightHint">💡 空運費 $70/kg，最低計費 0.1kg（$7 元）</div>

  <div class="sep"></div>
  <div class="card-title" style="margin-bottom:8px"><span>4</span>利潤設定（依商品自動調整）</div>
  <div class="row3">
    <div>
      <div class="mini-label">批發利潤 %</div>
      <input type="number" id="wholesaleRate" value="20" min="0" max="200" oninput="calcAll()">
    </div>
    <div>
      <div class="mini-label">零售利潤 %</div>
      <input type="number" id="retailRate" value="50" min="0" max="200" oninput="calcAll()">
    </div>
    <div>
      <div class="mini-label">空運費 NT$</div>
      <input type="number" id="shippingFee" value="0" min="0" readonly style="background:#f5f2f8;color:var(--text3)">
    </div>
  </div>
  <div class="hint" id="rateHint"></div>
</div>

<!-- 價格預覽 -->
<div id="priceSection" style="display:none">
  <div class="card">
    <div class="card-title" style="margin-bottom:8px">💰 定價預覽</div>
    <div class="price-grid" id="priceGrid"></div>
    <div id="marketCompare"></div>
  </div>
</div>

<button class="generate-btn" onclick="generate()">✨ 生成 LINE 群組文案</button>

<div class="output-section" id="outputSec" style="display:none">
  <div class="card" style="margin-top:8px">
    <div class="output-label">📱 LINE 群組文案預覽</div>
    <pre class="output-box" id="outputBox"></pre>
    <button class="copy-btn" id="copyBtn" onclick="copyPost()">📋 複製完整文案</button>
  </div>
</div>

</div>

/* ===== STATE ===== */
let weightIsManual = false;
let currentWeight = 0;

/* ===== MAIN INPUT HANDLER ===== */
function onInput() {
  weightIsManual = false;
  analyzeProduct();
  calcAll();
}

function onWeightManual() {
  weightIsManual = true;
  document.getElementById('weightEstBadge').style.display = 'none';
  calcAll();
}

function analyzeProduct() {
  const txt = document.getElementById('prodInput').value.toLowerCase();
  const tagsEl = document.getElementById('detectedCatTags');

  // 多重匹配 - 收集所有命中的規則
  let matchedRules = [];
  for (let r of PRODUCT_RULES) {
    for (let k of r.kw) {
      if (txt.includes(k)) {
        matchedRules.push(r);
        break;
      }
    }
  }

  // 顯示分類 tags
  tagsEl.innerHTML = '';
  if (matchedRules.length === 0) {
    tagsEl.innerHTML = '<span style="font-size:11px;color:var(--text3)">未偵測到分類，輸入更多關鍵字</span>';
    return;
  }

  let allCats = [...new Set(matchedRules.flatMap(r => r.cats))];
  allCats.forEach(c => {
    const sp = document.createElement('span');
    sp.className = 'tag';
    sp.textContent = c;
    tagsEl.appendChild(sp);
  });

  // 自動估重：取第一個有重量的規則（非0）
  if (!weightIsManual) {
    let weightRule = matchedRules.find(r => r.w > 0);
    if (weightRule) {
      document.getElementById('prodWeight').value = weightRule.w;
      document.getElementById('weightHint').textContent = '💡 ' + weightRule.label + '（僅供參考，可手動修改）';
      document.getElementById('weightHint').className = 'hint warn';
      document.getElementById('weightEstBadge').style.display = 'inline-flex';
    } else {
      document.getElementById('weightHint').textContent = '💡 空運費 $70/kg，最低計費 0.1kg（$7 元）';
      document.getElementById('weightHint').className = 'hint';
      document.getElementById('weightEstBadge').style.display = 'none';
    }
  }

  // 自動設定第一個主要商品的利潤比例（取非代購類型的第一個）
  let mainRule = matchedRules.find(r => r.wl > 0);
  if (mainRule) {
    document.getElementById('wholesaleRate').value = mainRule.wl;
    document.getElementById('retailRate').value = mainRule.rl;
    document.getElementById('rateHint').textContent = '✨ 已依商品類型自動設定：批發 ' + mainRule.wl + '%、零售 ' + mainRule.rl + '%';
    document.getElementById('rateHint').className = 'hint ok';
  }
}

/* ===== PRICE CALCULATOR ===== */
function calcAll() {
  const cost = parseFloat(document.getElementById('prodCost').value) || 0;
  let w = parseFloat(document.getElementById('prodWeight').value) || 0;
  const wRate = parseFloat(document.getElementById('wholesaleRate').value) || 20;
  const rRate = parseFloat(document.getElementById('retailRate').value) || 50;
  const mktLow = parseFloat(document.getElementById('mktLow').value) || 0;
  const mktHigh = parseFloat(document.getElementById('mktHigh').value) || 0;

  if (w > 0 && w < 0.1) w = 0.1;
  const ship = w > 0 ? Math.round(w * 70) : 0;
  document.getElementById('shippingFee').value = ship;
  currentWeight = w;

  // 市場行情狀態
  const mktStatus = document.getElementById('mktStatus');
  if (mktLow > 0 || mktHigh > 0) {
    const mktMid = mktLow && mktHigh ? Math.round((mktLow + mktHigh) / 2) : (mktLow || mktHigh);
    mktStatus.innerHTML = '<div class="mkt-status info">📊 市場中間價約 <strong>$' + mktMid + '</strong> 元，定價時會納入參考</div>';
  } else {
    mktStatus.innerHTML = '';
  }

  if (cost <= 0) {
    document.getElementById('priceSection').style.display = 'none';
    return;
  }

  const total = cost + ship;
  const wp = Math.round(total * (1 + wRate / 100));
  const rp = Math.round(total * (1 + rRate / 100));

  // 市場行情建議價
  let suggestWp = 0, suggestRp = 0, suggestNote = '';
  if (mktLow > 0 || mktHigh > 0) {
    const mktMid = mktLow && mktHigh ? (mktLow + mktHigh) / 2 : (mktLow || mktHigh);
    // 建議零售取市場中間偏下10%（有競爭力），批發再低15%
    suggestRp = Math.round(mktMid * 0.9);
    suggestWp = Math.round(mktMid * 0.75);

    // 如果建議價低於成本，改用成本算
    if (suggestRp < rp) { suggestRp = rp; suggestNote = '⚠️ 市場行情低，建議以成本為主'; }
    if (suggestWp < wp) { suggestWp = wp; }
  }

  // 顯示價格
  const priceGrid = document.getElementById('priceGrid');
  let gridHTML = `
    <div class="price-card ws">
      <div class="pc-label">🤝 批發價（成本算）</div>
      <div class="pc-val">$${wp}</div>
      <div class="pc-sub">成本 $${cost} + 運 $${ship}，+${wRate}%</div>
    </div>
    <div class="price-card rt">
      <div class="pc-label">🎀 零售價（成本算）</div>
      <div class="pc-val">$${rp}</div>
      <div class="pc-sub">成本 $${cost} + 運 $${ship}，+${rRate}%</div>
    </div>`;

  if (suggestRp > 0) {
    gridHTML += `
    <div class="price-card suggest">
      <div class="pc-label">💡 市場行情批發建議</div>
      <div class="pc-val">$${suggestWp}</div>
      <div class="pc-sub">參考市場行情下調</div>
    </div>
    <div class="price-card suggest">
      <div class="pc-label">💡 市場行情零售建議</div>
      <div class="pc-val">$${suggestRp}</div>
      <div class="pc-sub">比市場低約 10%，有競爭力</div>
    </div>`;
  }

  priceGrid.innerHTML = gridHTML;
  document.getElementById('priceSection').style.display = 'block';

  // 市場比較提示
  const marketCompare = document.getElementById('marketCompare');
  if (suggestNote) {
    marketCompare.innerHTML = '<div class="mkt-status warn" style="margin-top:8px">' + suggestNote + '</div>';
  } else if (suggestRp > 0) {
    if (rp > suggestRp) {
      marketCompare.innerHTML = '<div class="mkt-status warn" style="margin-top:8px">⚠️ 成本算出的零售 $' + rp + ' 高於市場建議 $' + suggestRp + '，建議重新評估進貨成本</div>';
    } else {
      marketCompare.innerHTML = '<div class="mkt-status good" style="margin-top:8px">✅ 定價有競爭力，比市場行情低約 10%，可吸引客人下單</div>';
    }
  } else {
    marketCompare.innerHTML = '';
  }
}

/* ===== GENERATE POST ===== */
function generate() {
  const input = document.getElementById('prodInput').value.trim();
  if (!input) { alert('請輸入商品名稱或描述！'); return; }

  const cost = parseFloat(document.getElementById('prodCost').value) || 0;
  let w = parseFloat(document.getElementById('prodWeight').value) || 0;
  const wRate = parseFloat(document.getElementById('wholesaleRate').value) || 20;
  const rRate = parseFloat(document.getElementById('retailRate').value) || 50;
  const mktLow = parseFloat(document.getElementById('mktLow').value) || 0;
  const mktHigh = parseFloat(document.getElementById('mktHigh').value) || 0;

  if (w > 0 && w < 0.1) w = 0.1;
  const ship = w > 0 ? Math.round(w * 70) : 0;
  const total = cost + ship;
  const wp = cost > 0 ? Math.round(total * (1 + wRate / 100)) : 0;
  const rp = cost > 0 ? Math.round(total * (1 + rRate / 100)) : 0;

  // 市場行情建議價（文案用）
  let finalWp = wp, finalRp = rp;
  if (mktLow > 0 || mktHigh > 0) {
    const mktMid = mktLow && mktHigh ? (mktLow + mktHigh) / 2 : (mktLow || mktHigh);
    const sRp = Math.round(mktMid * 0.9);
    const sWp = Math.round(mktMid * 0.75);
    if (sRp > rp) finalRp = sRp;
    if (sWp > wp) finalWp = sWp;
  }

  const now = new Date();
  const yr = String(now.getFullYear()).slice(2);
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const code = finalWp > 0 ? '#' + yr + mo + finalWp : '';

  // 多重分類收集
  const txt = input.toLowerCase();
  let allCats = [], allTags = [];
  for (let r of PRODUCT_RULES) {
    for (let k of r.kw) {
      if (txt.includes(k)) {
        allCats.push(...r.cats);
        allTags.push(...r.tags);
        break;
      }
    }
  }
  if (allCats.length === 0) { allCats = ['ㅣ日常用品ㅣ生活選物']; allTags = ['#生活小物', '#日常用品']; }
  allCats = [...new Set(allCats)];
  allTags = [...new Set(allTags)];

  const lines = input.split('\n');
  const firstLine = lines[0].substring(0, 60);
  const restLines = lines.slice(1).join(' ').trim();

  let post = '𐙚 𝐋𝐈𝐍𝐒𝐇𝐎𝐏 𝐍𝐄𝐖 𝐀𝐑𝐑𝐈𝐕𝐀𝐋 𐙚\n';
  post += '──────────────────\n\n';
  post += '【商品】 ' + firstLine + '\n';
  if (restLines) post += '【描述】 ' + restLines + '\n';
  if (mktLow > 0 && mktHigh > 0) post += '【市場行情】 $' + mktLow + ' ～ $' + mktHigh + ' 元\n';
  else if (mktLow > 0) post += '【市場行情】 約 $' + mktLow + ' 元起\n';

  post += '\n';
  if (finalRp > 0 && finalWp > 0) {
    post += '批發 $' + finalWp + '  ｜  零售 $' + finalRp + '\n';
    if (code) post += '批發代碼：' + code + '\n';
  }

  post += '\n──────────────────\n';
  allCats.forEach(c => { post += c + '\n'; });
  post += '\n';

  let line = '';
  allTags.forEach((t, i) => {
    line += t + ' ';
    if ((i + 1) % 4 === 0) { post += line.trim() + '\n'; line = ''; }
  });
  if (line.trim()) post += line.trim() + '\n';

  document.getElementById('outputBox').textContent = post;
  document.getElementById('outputSec').style.display = 'block';
  document.getElementById('copyBtn').textContent = '📋 複製完整文案';
  setTimeout(() => {
    document.getElementById('outputSec').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

/* ===== COPY ===== */
function copyPost() {
  const text = document.getElementById('outputBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 複製成功！直接去 LINE 貼上囉 (⁎⁍̴̛ᴗ⁍̴̛⁎)';
    setTimeout(() => { btn.textContent = '📋 複製完整文案'; }, 2500);
  }).catch(() => alert('複製失敗，請手動全選複製。'));
}
</script>
